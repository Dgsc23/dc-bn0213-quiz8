<script>
var D={"video": "https://pub-7fb2bb3e5a0b4096a57fc578b5a16078.r2.dev/bn0213/m10-lipids/lecture-fs-37da13d4.mp4", "mp3": "bn0213-m10-lipids.mp3", "blitz": [["The four S's (his red pen)", "<b>Sat · Single · Straight · Solid</b> at room temp. Mirror: <b>Un · Double · Bend · Liquid</b>. Straight chains pack tightly, so they are solid.", 4139], ["Saturated means", "Saturated <b>with hydrogens</b>. No C=C double bonds.", 3183], ["The two ends", "<b>Carboxyl</b> (COOH) end and <b>methyl</b> (omega) end. Alpha/beta count from COOH; omega family counts from methyl.", 3122], ["Omega naming", "Position of the <b>first double bond from the methyl end</b>. 3 in = omega-3, 6 in = omega-6, 9 in = omega-9.", 3930], ["C18:3 means", "<b>18 carbons, 3 double bonds.</b> Carbons before the colon, double bonds after.", 3944], ["Suffixes", "<b>-anoic</b> = saturated (eicosanoic/arachidic, peanut oil). <b>-enoic</b> = unsaturated (eicosapentaenoic, EPA).", 3816], ["Triacylglycerol", "<b>Glycerol + 3 fatty acids</b> via <b>3 ester bonds</b>. Stored in adipocytes; oils in plant seeds.", 2880], ["Wax", "Fatty acid + <b>monohydric long-chain alcohol</b>. Example: cetyl palmitate (spermaceti).", 3016], ["Fat-soluble vitamins", "<b>D, E, A, K</b> (his slide: DEAK). Need dietary fat to be absorbed.", 2584], ["Essential fatty acids", "<b>Omega-3 and omega-6</b>. Cannot be made, must be eaten. Parents: <b>linoleic</b> (n-6) and <b>alpha-linolenic</b> (n-3). <b>Omega-9 is NOT essential.</b>", 3870], ["MUFA vs PUFA", "MUFA = <b>one</b> double bond. PUFA = <b>more than one</b>.", 4400], ["The two branches", "Omega-6 → <b>arachidonic acid</b>. Omega-3 → <b>EPA</b> → <b>DHA</b>.", 4440], ["Eicosanoids", "Built from <b>20-carbon PUFAs</b> (eicosa = twenty). Arachidonic acid is C20:4.", 4640], ["Cis", "Hydrogens on the <b>same side</b> → <b>bend</b>. Natural food: almonds, avocados, bacon, canola oil.", 5968], ["Trans", "Hydrogens on <b>opposite sides</b> → <b>straight</b> → packs and acts like a <b>saturated</b> fat.", 5968], ["How trans fats are made", "<b>PARTIAL hydrogenation.</b> (Complete hydrogenation gives a saturated fat.)", 6128], ["Trans fat risk", "Raises <b>cardiovascular disease and diabetes</b> risk; mechanism unclear. Natural sources: milk, eggs, beef.", 6144], ["Phospholipid recipe", "<b>Alcohol + fatty acid + phosphate + amino alcohol.</b>", 6224], ["Two subtypes", "<b>Glycerol</b> → glycerophospholipid → <b>lecithin</b>. <b>Sphingosine</b> → sphingophospholipid → <b>sphingomyelin</b>.", 6328], ["Lecithin (know for sure)", "<b>Dipalmitoyl lecithin = lung surfactant.</b> LOWERS alveolar surface tension → prevents alveolar collapse. Premature infant → RDS.", 6379], ["Sphingomyelin (definitely know)", "A <b>large portion of the myelin sheath</b>.", 6505], ["Glycolipids", "<b>Ceramide + carbohydrate.</b> Cerebroside = ONE sugar, in myelin. Ganglioside = MANY sugars, in gray matter.", 6672], ["Tay-Sachs", "<b>Hexosaminidase A</b> missing → <b>GM2 ganglioside</b>. Cherry-red spot, startle reflex, death &lt;2y. <b>NO hepatosplenomegaly.</b>", 7128], ["Gaucher", "<b>Glucocerebrosidase</b> missing → <b>glucocerebroside</b>. Hepatosplenomegaly, bone erosion, pancytopenia.", 7128], ["Niemann-Pick", "<b>Sphingomyelinase</b> missing → <b>sphingomyelin</b>. Cherry-red spot <b>AND</b> hepatosplenomegaly.", 7128], ["Cherry-red spot mnemonic", "<b>Cherry Trees Never Grow Tall In Sand</b>: CRAO, Trauma, Niemann-Pick, Gaucher, Tay-Sachs, Sandhoff.", 6707], ["His discriminator", "Cherry-red spot + CNS signs, <b>no</b> hepatosplenomegaly = <b>Tay-Sachs</b>. Board order: 1) Tay-Sachs 2) Niemann-Pick 3) Gaucher.", 7082], ["Lipids are", "<b>Hydrophobic</b> and <b>energy dense</b>. Soluble in ether, chloroform, benzene, acetone.", 2328]], "cues": [{"t": "52:03", "sec": 3122, "emp": "high", "quote": "make sure you know that there's those two terminus, the methyl terminus and the carboxyl terminus", "topic": "Fatty acid has two ends"}, {"t": "53:03", "sec": 3183, "emp": "high", "quote": "watch this, everybody, and hopefully you will remember this forever", "topic": "Saturated = saturated WITH HYDROGENS"}, {"t": "59:43", "sec": 3583, "emp": "med", "quote": "Notice this, everyone. Pay attention. Look. See how there's a slight bend?", "topic": "A double bond puts a bend in the chain"}, {"t": "64:30", "sec": 3870, "emp": "high", "quote": "essential fatty acids the omega-3s and the omega-6s make sure you know that those are essential we have to eat them because we cannot make them", "topic": "Essential fatty acids"}, {"t": "65:30", "sec": 3930, "emp": "high", "quote": "Make sure you understand that nomenclature. You will see that on a test.", "topic": "Omega nomenclature (STRONGEST CUE)"}, {"t": "65:44", "sec": 3944, "emp": "high", "quote": "make sure you know that means it's 18 carbons long and it has 3 double bonds", "topic": "Reading C18:3 (alpha-linolenic)"}, {"t": "66:34", "sec": 3994, "emp": "med", "quote": "EPA, I would say you should know about eicosapentaenoic acid", "topic": "EPA"}, {"t": "68:59", "sec": 4139, "emp": "high", "quote": "here's an easy way I want you to remember this. Everyone, please pay attention. Make notes here.", "topic": "THE FOUR S's"}, {"t": "77:20", "sec": 4640, "emp": "med", "quote": "this is really important. Listen up.", "topic": "Omega-6 vs omega-3 balance"}, {"t": "79:22", "sec": 4762, "emp": "med", "quote": "I don't want you to hate on omega sixes, but I want you to know this. The Western diet takes in way too much omega six.", "topic": "Western diet omega-6 excess"}, {"t": "101:24", "sec": 6084, "emp": "high", "quote": "here's your tag. You're going to have to draw this out on the exam. Just kidding. Don't worry about it, but this is easy.", "topic": "TAG = glycerol + 3 fatty acids"}, {"t": "106:19", "sec": 6379, "emp": "high", "quote": "This is one you should know for sure. Dipalmitoyl lecithin is the lung surfactant", "topic": "Lecithin = lung surfactant"}, {"t": "108:25", "sec": 6505, "emp": "high", "quote": "You should definitely know this. Large portion of the myelin sheath. That's really important.", "topic": "Cerebrosides in myelin"}, {"t": "111:15", "sec": 6675, "emp": "med", "quote": "here's where we can correlate it clinically, everyone pay attention watch this", "topic": "Lysosomal storage diseases"}], "nope": [{"t": "51:22", "sec": 3082, "quote": "You don't have to memorize the structures. But it's more important you understand how they work.", "topic": "Fatty acid structures"}, {"t": "84:06", "sec": 5046, "quote": "FYI, not testable", "topic": "Prostaglandins & Arachidonic Metabolism (COX cascade) - the slide itself is stamped 'FYI: NOT TESTABLE'"}, {"t": "84:50", "sec": 5090, "quote": "You don't have to memorize any of this.", "topic": "Tissue-specific isomerases, prostacyclin, thromboxane"}, {"t": "103:55", "sec": 6235, "quote": "This diagram is not testable. But just know that phospholipids are going to have a phosphate", "topic": "Phospholipid classification diagram (slide reads '*This diagram is not testable.')"}], "drill": [{"q": "According to Dr. Basso, what is the general structure of a triacylglycerol (what your lab report calls a triglyceride)?", "o": ["A glycerol backbone joined to a single steroid nucleus", "Three fatty acid chains joined to glycerol by ester linkages", "Two fatty acid chains and a phosphate group joined to glycerol", "One fatty acid wrapped around three glycerol molecules"], "c": 1, "r": ["✗ A steroid nucleus defines sterols like cholesterol, not a triacylglycerol; tags are built on glycerol with fatty acids, not a steroid ring.", "✓ Dr. Basso defines a tag as three fatty acid chains (one, two, and three) each attached to the three-carbon glycerol through an ester linkage.", "✗ Two fatty acids plus a phosphate describes a phospholipid, which is why phospholipids sit in membranes; a tag has three fatty acids and no phosphate.", "✗ The ratio is reversed: one glycerol carries three fatty acids, not one fatty acid carrying three glycerols."], "ts": 2838, "cat": "Triacylglycerols & Wax", "src": "Dr. Basso - Lecture · 47:18 · Fats (Triacylglycerols): glycerol + 3 fatty acids"}, {"q": "Dr. Basso describes glycerol, the backbone that anchors the three fatty acids of a triacylglycerol. What kind of molecule is glycerol?", "o": ["A long-chain saturated fatty acid", "A phosphate-containing head group", "A three-carbon alcohol", "A cholesterol-derived steroid ring"], "c": 2, "r": ["✗ The long chains are the three fatty acids bonded to glycerol; glycerol itself is not a fatty acid.", "✗ A phosphate head group belongs to phospholipids; the tag backbone is a simple alcohol with no phosphate.", "✓ Dr. Basso states glycerol is an alcohol that is just three carbons, providing the attachment points for the fatty acids.", "✗ Steroid rings are a separate lipid class; glycerol is a small three-carbon alcohol, not a ring."], "ts": 2854, "cat": "Triacylglycerols & Wax", "src": "Dr. Basso - Lecture · 47:34 · Fats (Triacylglycerols): glycerol + 3 fatty acids"}, {"q": "Dr. Basso says triacylglycerols are how the body likes to store its fats. Where are they primarily stored?", "o": ["In adipocytes (fat cells)", "In the myelin sheaths of neurons", "Floating freely in the bloodstream as glucose", "Inside red blood cells"], "c": 0, "r": ["✓ Dr. Basso says the esters of fatty acids with glycerol are stored in adipocytes, which is how the body stores fat.", "✗ Myelin is made of fat, but it insulates axons; it is not the body's triacylglycerol storage depot.", "✗ Glucose is a carbohydrate, not a triacylglycerol, and tags are hydrophobic so they do not float freely in blood.", "✗ Red blood cells are not the fat-storage site; adipocytes are the dedicated storage cells for tags."], "ts": 2862, "cat": "Triacylglycerols & Wax", "src": "Dr. Basso - Lecture · 47:42 · Fats (Triacylglycerols): glycerol + 3 fatty acids"}, {"q": "Dr. Basso explains that fats can also take the form of a wax. How does he describe the structure of a wax?", "o": ["Three fatty acids esterified to glycerol", "Two fatty acids attached to a sphingosine backbone", "A fatty acid bonded to a phosphate head group", "Esters of fatty acids with a monohydric alcohol (a single hydroxyl group)"], "c": 3, "r": ["✗ Three fatty acids on glycerol is a triacylglycerol; a wax uses a different alcohol with only one hydroxyl, not glycerol's three.", "✗ A sphingosine backbone describes sphingolipids, not waxes.", "✗ A phosphate head group describes a phospholipid; a wax contains no phosphate.", "✓ Dr. Basso defines a wax as esters of fatty acids with a monohydric alcohol, meaning an alcohol with just one hydroxyl group."], "ts": 2888, "cat": "Triacylglycerols & Wax", "src": "Dr. Basso - Lecture · 48:08 · Fats (Triacylglycerols): glycerol + 3 fatty acids"}, {"q": "Dr. Basso opens with a picture of fat surrounded by flames. What point is he making about lipids as a fuel?", "o": ["Fat cannot be used for energy and must be excreted", "Fat is the most energy-dense fuel, giving about 9 kcal per gram, more than any other source", "Fat and carbohydrate release exactly the same energy per gram", "Fat only releases energy when it is combined with water"], "c": 1, "r": ["✗ The opposite is true; fat is a rich fuel, which is the whole reason for the burning-fat flame image.", "✓ Dr. Basso stresses fat is a very dense energy source at about 9 kcal per gram, the most energy per gram of any macronutrient.", "✗ Fat yields about 9 kcal per gram, noticeably more than carbohydrate or protein, so they are not equal.", "✗ Lipids are hydrophobic and do not need water to release energy; their energy comes from breaking carbon bonds."], "ts": 2128, "cat": "Lipid Properties & Function", "src": "Dr. Basso - Lecture · 35:28 · Introduction: Properties (hydrophobic, high energy)"}, {"q": "Dr. Basso says the only good news about an oil spill is that the oil stays in blobs instead of dissolving into the ocean. What property explains this?", "o": ["Oil is denser than water and simply sinks", "Oil forms ester bonds with the surrounding water molecules", "Oil is a charged, polar molecule", "Oil is hydrophobic, so it does not mix with water and sticks to itself"], "c": 3, "r": ["✗ Density is not his point; he attributes the clumping to the oil disliking water, not to sinking.", "✗ Oil does not bond to water; being hydrophobic, it actively avoids water.", "✗ If oil were charged and polar it would dissolve in water; it clumps precisely because it is nonpolar and hydrophobic.", "✓ Dr. Basso says oil likes to stick together because it is hydrophobic and does not like water, so it stays contained rather than dispersing."], "ts": 2201, "cat": "Lipid Properties & Function", "src": "Dr. Basso - Lecture · 36:41 · Introduction: Lipids"}, {"q": "Dr. Basso likes to say that lipids are mostly hydrocarbons. Why does that composition make them such a good energy source?", "o": ["Breaking the many carbon-to-carbon and carbon-to-hydrogen bonds releases a large amount of energy", "Hydrocarbons dissolve easily in blood and are quickly absorbed", "Hydrocarbons are packed with phosphate groups that store energy", "Hydrocarbons are charged, so they attract water and swell"], "c": 0, "r": ["✓ Dr. Basso explains lipids are largely carbons and hydrogens, and breaking those numerous carbon-carbon and carbon-hydrogen bonds gives you a lot of energy.", "✗ Lipids are hydrophobic and do not dissolve easily in blood; solubility is not the source of their energy.", "✗ Hydrocarbons are carbon and hydrogen, not phosphate; the energy comes from the hydrocarbon bonds themselves.", "✗ Hydrocarbons are nonpolar and uncharged, which is why they repel water rather than attract it."], "ts": 2250, "cat": "Lipid Properties & Function", "src": "Dr. Basso - Lecture · 37:30 · Introduction: Lipids"}, {"q": "How does Dr. Basso define lipids as a group of molecules?", "o": ["A single, uniform molecule found only in cell membranes", "A family of water-soluble sugars", "A heterogeneous group of compounds (fats, oils, steroids, waxes) that contain fatty acids or a steroid nucleus", "A class of proteins that fold up to store energy"], "c": 2, "r": ["✗ Lipids are diverse, not a single molecule, and they do far more than sit in membranes.", "✗ Sugars are carbohydrates and are water-soluble; lipids are hydrophobic and chemically distinct.", "✓ Dr. Basso defines lipids as a heterogeneous group, including fats, oils, steroids, and waxes, that contain either fatty acids or a steroid nucleus.", "✗ Lipids are not proteins; they are largely hydrocarbons containing fatty acids or a steroid nucleus."], "ts": 2211, "cat": "Lipid Properties & Function", "src": "Dr. Basso - Lecture · 36:51 · Introduction: Lipids"}, {"q": "Lipids are insoluble in water. According to Dr. Basso, what CAN dissolve them, as shown by his paint-cleanup example?", "o": ["Salt water", "Strong acids only", "Nothing; lipids are insoluble in every solvent", "Organic solvents such as ether, chloroform, benzene, and acetone"], "c": 3, "r": ["✗ Salt water is still water-based; because lipids are hydrophobic, adding salt does not dissolve them.", "✗ He never cites acids; he names organic solvents and demonstrates with acetone on spilled paint.", "✗ Lipids are insoluble in water but do dissolve in organic solvents, so nothing is wrong.", "✓ Dr. Basso says lipids are insoluble in water but dissolve in organic solvents like ether, chloroform, benzene, and acetone (acetone doubling as paint thinner)."], "ts": 2305, "cat": "Lipid Properties & Function", "src": "Dr. Basso - Lecture · 38:25 · Introduction: Lipids"}, {"q": "Dr. Basso warns that eating a dry salad with no dressing may cause you to miss out on nutrients. Which vitamins require dietary fat for absorption?", "o": ["Vitamin C and the B-complex vitamins", "The fat-soluble vitamins D, E, A, and K", "Only vitamin C", "All of the water-soluble vitamins"], "c": 1, "r": ["✗ Vitamin C and the B vitamins are water-soluble and do not need fat for absorption.", "✓ Dr. Basso says fats let you absorb the fat-soluble vitamins D, E, A, and K, which is why a salad should be paired with fat such as nuts, avocado, or olive oil.", "✗ Vitamin C is water-soluble; the fat-dependent vitamins are D, E, A, and K.", "✗ Water-soluble vitamins dissolve in water and do not require fat; the fat-soluble set is D, E, A, and K."], "ts": 2410, "cat": "Lipid Properties & Function", "src": "Dr. Basso - Lecture · 40:10 · Lipid Function (energy, membrane, DEAK, hormones)"}, {"q": "Dr. Basso points to testosterone and estrogen to illustrate which function of lipids?", "o": ["Serving as the body's genetic blueprint", "Carrying oxygen through the blood", "Serving as the raw material for steroid hormones", "Speeding up digestion as enzymes"], "c": 2, "r": ["✗ Genetic information is carried by nucleic acids, not lipids.", "✗ Oxygen transport is the job of hemoglobin, not lipids.", "✓ Dr. Basso lists steroid hormones such as testosterone and estrogen as an important lipid-based function in humans.", "✗ Enzymes are proteins; here lipids serve as hormone precursors, not digestive catalysts."], "ts": 2527, "cat": "Lipid Properties & Function", "src": "Dr. Basso - Lecture · 42:07 · Lipid Function (energy, membrane, DEAK, hormones)"}, {"q": "In the cadaver lab you should find a fat pad around the kidney. Dr. Basso uses this to illustrate which function of fat?", "o": ["Protection and cushioning of internal organs", "Production of digestive enzymes", "Synthesis of DNA", "Transport of oxygen to tissues"], "c": 0, "r": ["✓ Dr. Basso says the fat pad around the kidney provides protection, cushioning the organ (his car-accident analogy about absorbing impact).", "✗ Digestive enzymes are proteins made by glands, not a role of the perirenal fat pad.", "✗ DNA synthesis has nothing to do with the protective fat around organs.", "✗ Oxygen transport is hemoglobin's job; the kidney fat pad is about physical protection."], "ts": 2551, "cat": "Lipid Properties & Function", "src": "Dr. Basso - Lecture · 42:31 · Lipid Function (energy, membrane, DEAK, hormones)"}, {"q": "Dr. Basso notes that fat also insulates nerve cells. Which structure did he say is made of fat?", "o": ["The ribosomes of the neuron", "The synaptic vesicles", "The cell nucleus", "The myelin sheath wrapping the axons"], "c": 3, "r": ["✗ Ribosomes are made of RNA and protein, not fat.", "✗ Synaptic vesicles store neurotransmitters; he did not identify them as the fatty insulating structure.", "✗ The nucleus houses DNA; it is not the fatty insulation of the axon.", "✓ Dr. Basso says the myelin that wraps around your axons is made of fat, insulating the nerve fiber."], "ts": 2629, "cat": "Lipid Properties & Function", "src": "Dr. Basso - Lecture · 43:49 · Lipid Function (energy, membrane, DEAK, hormones)"}, {"q": "Among the functions of lipids, Dr. Basso lists lung surfactant. Which lipid did he name as the lung surfactant?", "o": ["Cholesterol", "Dipalmitoyl lecithin", "Glycerol", "Arachidonic acid"], "c": 1, "r": ["✗ Cholesterol is a membrane sterol and hormone precursor, not the surfactant he named.", "✓ Dr. Basso names dipalmitoyl lecithin as the lung surfactant, mentioning it alongside respiratory distress syndrome from lab.", "✗ Glycerol is the three-carbon alcohol backbone of tags, not the lung surfactant.", "✗ Arachidonic acid is a fatty acid precursor for eicosanoids, not the surfactant he cited."], "ts": 2641, "cat": "Lipid Properties & Function", "src": "Dr. Basso - Lecture · 44:01 · Lipid Function (energy, membrane, DEAK, hormones)"}, {"q": "Dr. Basso argues that phospholipids may be the single most common molecule in the entire body. What is his reasoning?", "o": ["Every cell membrane in the body is built from phospholipids, and there are roughly 20 trillion cells", "Phospholipids are the main mineral in bone", "Phospholipids circulate in the blood as sugar", "Each phospholipid molecule contains three fatty acids, making them heavy"], "c": 0, "r": ["✓ Dr. Basso reasons that all membranes use phospholipids and, multiplied across roughly 20 trillion cells, they are probably the most common molecule in the body.", "✗ Bone mineral is largely calcium phosphate, not phospholipid.", "✗ Phospholipids are hydrophobic membrane lipids, not blood sugar (that is glucose, a carbohydrate).", "✗ A phospholipid has two fatty acids plus a phosphate, not three; his reasoning is about membrane abundance, not molecular weight."], "ts": 2393, "cat": "Phospholipids & Sphingolipids", "src": "Dr. Basso - Lecture · 39:53 · Lipid Function (energy, membrane, DEAK, hormones)"}, {"q": "According to Dr. Basso, a wax is an ester formed when a fatty acid combines with which other component?", "o": ["A molecule of glycerol", "A phosphate group", "A long-chain alcohol", "A second fatty acid"], "c": 2, "r": ["✗ Glycerol joined to three fatty acids makes a triacylglyceride, not a wax.", "✗ A phosphate group is the hallmark of a phospholipid, not a component of a wax.", "✓ He defined a wax as the ester of a fatty acid with a long-chain alcohol (e.g., palmitic acid forming spermaceti wax).", "✗ A wax pairs a fatty acid with a long-chain alcohol, not with a second fatty acid."], "ts": 2901, "cat": "Triacylglycerols & Wax", "src": "Dr. Basso - Lecture · 48:21 · Wax: ester of fatty acid + long-chain alcohol"}, {"q": "Which of the following did Dr. Basso list as a function of waxes in animals and plants?", "o": ["Carrying oxygen in the blood", "Energy storage and waterproofing", "Encoding proteins for the cell", "Buffering the pH of blood"], "c": 1, "r": ["✗ Oxygen transport is the job of hemoglobin, not a function of wax.", "✓ He listed the wax functions as energy storage, waterproofing, and being hydrophobic (candles are wax too).", "✗ Encoding proteins is the role of nucleic acids, not lipids such as wax.", "✗ pH buffering was not among the wax functions he named."], "ts": 3064, "cat": "Triacylglycerols & Wax", "src": "Dr. Basso - Lecture · 51:04 · Wax: ester of fatty acid + long-chain alcohol"}, {"q": "Dr. Basso noted that burn victims are at major risk of dehydration in part because they lose which protective feature?", "o": ["Their outer oily, waterproof skin barrier", "Their store of essential fatty acids", "Their supply of triacylglycerols", "Their carboxyl termini"], "c": 0, "r": ["✓ He said skin's oily, waterproof coating guards against dehydration, and losing that outer barrier is one reason burn victims dehydrate.", "✗ Essential fatty acids concern the diet (omega-3/omega-6), not the skin's physical water barrier he described.", "✗ Triacylglycerols are an energy store, not the surface waterproofing layer lost in a burn.", "✗ The carboxyl terminus is a feature of a fatty acid's chemistry, unrelated to the skin's barrier."], "ts": 3052, "cat": "Lipid Properties & Function", "src": "Dr. Basso - Lecture · 50:52 · Wax: ester of fatty acid + long-chain alcohol"}, {"q": "Dr. Basso stressed that every fatty acid has two ends. What are these two termini?", "o": ["An amino terminus and a carboxyl terminus", "A phosphate terminus and a glycerol terminus", "A methyl terminus and a carboxyl terminus", "A hydroxyl terminus and a sulfhydryl terminus"], "c": 2, "r": ["✗ An amino terminus belongs to amino acids; a fatty acid's non-acid end is a methyl group, not an amino group.", "✗ Phosphate and glycerol belong to other lipids (phospholipids and triacylglycerols), not the ends of a fatty acid.", "✓ He insisted you know the two ends: the methyl terminus (CH3) and the carboxyl terminus (COOH).", "✗ A fatty acid is capped by a methyl end and a carboxyl end; there is no hydroxyl or sulfhydryl terminus in his description."], "ts": 3123, "cat": "Fatty Acid Structure", "src": "Dr. Basso - Lecture · 52:03 · Fatty Acids: C4-C24, R-COOH, the 4 types"}, {"q": "Dr. Basso said the carbon-chain length of fatty acids can vary across what span, giving short-, medium-, and long-chain fatty acids?", "o": ["From 1 to 6 carbons", "From 10 to 100 carbons", "From 24 to 48 carbons", "From 4 to 24 carbons"], "c": 3, "r": ["✗ The lower bound he gave was four carbons (C4), not one.", "✗ 100 carbons far exceeds the C24 upper limit he stated.", "✗ C4 is the minimum, not C24; the span is 4 to 24, not 24 to 48.", "✓ He said fatty-acid length varies from C4 (four carbons) up to 24 carbons, giving short-, medium-, and long-chain fatty acids."], "ts": 3139, "cat": "Fatty Acid Structure", "src": "Dr. Basso - Lecture · 52:19 · Fatty Acids: C4-C24, R-COOH, the 4 types"}, {"q": "What did Dr. Basso give as the general formula for a fatty acid, reflecting its carboxyl-capped hydrocarbon chain?", "o": ["R-COOH", "R-NH2", "R-PO4", "R-OH"], "c": 0, "r": ["✓ He gave the general formula as R-COOH: a hydrocarbon chain (R) ending in the carboxyl (COOH) group.", "✗ R-NH2 depicts an amine; the acidic group of a fatty acid is the carboxyl, not an amino group.", "✗ R-PO4 implies a phosphate (a phospholipid feature), not a fatty acid.", "✗ R-OH is an alcohol; the defining end group of a fatty acid is the carboxyl (COOH)."], "ts": 3156, "cat": "Fatty Acid Structure", "src": "Dr. Basso - Lecture · 52:36 · Fatty Acids: C4-C24, R-COOH, the 4 types"}, {"q": "In the moment he told the class to remember 'forever,' how did Dr. Basso explain why a fatty acid is called saturated?", "o": ["Because it is dissolved (saturated) in water", "Because it is saturated with hydrogens", "Because it holds the maximum number of double bonds", "Because its carboxyl end is saturated with oxygen"], "c": 1, "r": ["✗ 'Saturated' here refers to hydrogen content, not to dissolving in water; fatty acids are hydrophobic.", "✓ His 'remember this forever' point: a fatty acid is saturated because it is saturated WITH hydrogens (no carbon-carbon double bonds, so hydrogens everywhere).", "✗ The reverse is true: saturated fatty acids have NO carbon-carbon double bonds, which is why they carry the most hydrogens.", "✗ It refers to hydrogens along the chain, not oxygen at the carboxyl group."], "ts": 3183, "cat": "Saturated vs Unsaturated", "src": "Dr. Basso - Lecture · 53:03 · Fatty Acids: C4-C24, R-COOH, the 4 types"}, {"q": "Besides being 'saturated with hydrogens,' how did Dr. Basso say you can recognize a saturated fatty acid by its bonds?", "o": ["It has exactly one carbon-carbon double bond", "It has many carbon-carbon double bonds", "It has no carbon-carbon double bonds", "It has a double bond only at the methyl end"], "c": 2, "r": ["✗ One carbon-carbon double bond describes a monounsaturated fatty acid, not a saturated one.", "✗ Many double bonds describes a polyunsaturated fatty acid, the opposite of saturated.", "✓ He said we call it saturated 'because there are no double bonds' (no carbon-to-carbon double bonds; the carboxyl group's own bond is not counted).", "✗ A saturated fatty acid has no carbon-carbon double bonds anywhere, including at the methyl end."], "ts": 3170, "cat": "Saturated vs Unsaturated", "src": "Dr. Basso - Lecture · 52:50 · Fatty Acids: C4-C24, R-COOH, the 4 types"}, {"q": "How did Dr. Basso distinguish a MONOunsaturated from a POLYunsaturated fatty acid?", "o": ["Mono has many double bonds; poly has one", "Mono is always an omega-3; poly is always an omega-6", "Mono is essential; poly is non-essential", "Mono has one double bond; poly has many double bonds"], "c": 3, "r": ["✗ This reverses the prefixes; mono means one and poly means many.", "✗ The omega number depends on where the first double bond sits, not on the mono/poly distinction.", "✗ Essentiality (omega-3/omega-6) is a separate property and does not define mono versus poly.", "✓ 'Mono' means one double bond (e.g., oleic acid) and 'poly' means many double bonds (the PUFAs)."], "ts": 3350, "cat": "Saturated vs Unsaturated", "src": "Dr. Basso - Lecture · 55:50 · Fatty Acids: C4-C24, R-COOH, the 4 types"}, {"q": "Dr. Basso taught a quick way to classify a fatty acid as omega-3, -6, or -9. What is the method?", "o": ["Count carbons from the carboxyl (alpha) end to the first double bond", "Count carbons from the methyl (omega) end to the first double bond", "Count the total number of double bonds in the chain", "Count the total number of carbons in the chain"], "c": 1, "r": ["✗ You start from the methyl/omega end, not the carboxyl (alpha) end.", "✓ He said to look at the methyl (omega) end and count carbons; the first double bond you reach dictates omega-3, -6, or -9.", "✗ The omega number marks the position of the FIRST double bond from the omega end, not the total number of double bonds.", "✗ Total chain length does not set the omega number; the position of the first double bond does."], "ts": 3286, "cat": "Nomenclature & Omega", "src": "Dr. Basso - Lecture · 54:46 · Fatty Acids: C4-C24, R-COOH, the 4 types"}, {"q": "When identifying an omega-3 PUFA, why did Dr. Basso say the additional double bonds further down the chain do not change the classification?", "o": ["Only the double bond nearest the omega (methyl) end sets the number", "An omega-3 has only one double bond in total", "You actually count double bonds from the carboxyl end", "The additional double bonds cancel each other out"], "c": 0, "r": ["✓ He stressed counting from the omega end to the FIRST double bond only: 'It doesn't matter that there's another one coming up. You just count the first one.'", "✗ An omega-3 PUFA has several double bonds; only the first one from the omega end matters for the name.", "✗ Counting begins at the omega (methyl) end, not the carboxyl end.", "✗ Extra double bonds are not cancelled; they are simply not used to assign the omega number."], "ts": 3332, "cat": "Nomenclature & Omega", "src": "Dr. Basso - Lecture · 55:32 · Fatty Acids: C4-C24, R-COOH, the 4 types"}, {"q": "Dr. Basso said certain fatty acids are 'essential.' Which fatty acids did he identify as essential, and why?", "o": ["The omega-9s, because the body overproduces them", "All saturated fatty acids, because they store the most energy", "Only short-chain fatty acids, because they absorb fastest", "The omega-3s and omega-6s, because we cannot make them and must eat them"], "c": 3, "r": ["✗ Omega-9 (e.g., oleic acid) is one the body CAN make, so it is not essential.", "✗ Saturation and energy storage do not define 'essential'; essential means it must come from the diet.", "✗ Chain length and absorption speed are unrelated; essentiality is about being unable to synthesize it.", "✓ He named the essential fatty acids as the omega-3s and omega-6s: 'We cannot make those ourselves. That's why we need to eat them.'"], "ts": 3374, "cat": "Essential Fatty Acids & Eicosanoids", "src": "Dr. Basso - Lecture · 56:14 · Fatty Acids: C4-C24, R-COOH, the 4 types"}, {"q": "In fatty acid naming, Dr. Basso mapped 'alpha' and 'omega' to the two ends of the molecule. Which mapping did he give?", "o": ["Alpha = the methyl end; omega = the carboxyl end", "Alpha = the carboxyl end; omega = the methyl end", "Alpha = the middle of the chain; omega = both ends", "Alpha = the first double bond; omega = the last double bond"], "c": 1, "r": ["✗ This reverses them; omega (meaning 'the end') is the methyl end, and alpha ('beginning') is the carboxyl end.", "✓ He mapped the carboxyl end as the alpha end and the methyl end as the omega end (alpha = first/beginning, omega = the end).", "✗ Alpha and omega label the two termini, not the middle or both ends at once.", "✗ Alpha and omega denote the ends of the molecule, not particular double bonds."], "ts": 3570, "cat": "Nomenclature & Omega", "src": "Dr. Basso - Lecture · 59:30 · Nomenclature / Naming: unsaturated vs saturated"}, {"q": "Dr. Basso told the class to 'pay attention' to a fatty acid with a double bond. What does a carbon-carbon double bond do to the shape of the chain?", "o": ["It makes the chain perfectly straight", "It adds extra hydrogens at that carbon", "It puts a bend (kink) in the chain", "It converts the fatty acid into glycerol"], "c": 2, "r": ["✗ A double bond does the opposite of straightening; the saturated (no double bond) chain is the straight one.", "✗ At the double bond the carbons are missing hydrogens, which is why it is unsaturated, not gaining hydrogens.", "✓ He told the class to notice the 'slight bend': a carbon-carbon double bond changes the chain's linearity and puts a bend in it.", "✗ A double bond does not turn a fatty acid into glycerol; glycerol is a separate backbone molecule."], "ts": 3583, "cat": "Saturated vs Unsaturated", "src": "Dr. Basso - Lecture · 59:43 · Nomenclature / Naming: unsaturated vs saturated"}, {"q": "Dr. Basso contrasted the names 'icosanoic' and 'icosapentaenoic (EPA)', which differ only in one part of the ending. Based on the suffix, which statement is correct?", "o": ["Both names indicate saturated fatty acids", "Icosanoic is unsaturated; icosapentaenoic (EPA) is saturated", "Both names indicate unsaturated fatty acids", "Icosanoic is saturated; icosapentaenoic (EPA) is unsaturated"], "c": 3, "r": ["✗ Only icosanoic (-anoic) is saturated; the -enoic in icosapentaenoic marks a double bond, so it is unsaturated.", "✗ Reversed. The -anoic ending signals saturated and -enoic signals unsaturated.", "✗ Icosanoic ends in -anoic, which denotes a saturated fatty acid, not unsaturated.", "✓ The suffix -anoic means saturated (icosanoic), while -enoic means unsaturated, which is why EPA (icosapentaenoic) carries double bonds."], "ts": 3684, "cat": "Nomenclature & Omega", "src": "Dr. Basso - Lecture · 61:24 · Naming: -anoic (sat) vs -enoic (unsat)"}, {"q": "Using the Greek-letter naming Dr. Basso described, which carbon is the alpha carbon of a fatty acid?", "o": ["The terminal carbon at the very end of the chain", "The carbon adjacent to the carboxylic acid (COOH) group", "The carbon that carries the first double bond", "The methyl-end carbon"], "c": 1, "r": ["✗ That terminal carbon is the omega carbon, not the alpha carbon.", "✓ Numbering starts at the COOH end, so the carbon adjacent to the carboxylic acid is the alpha carbon; the next one is beta.", "✗ The position of the first double bond defines the omega number, not the alpha carbon.", "✗ The methyl end is the omega end; the alpha carbon is at the opposite (carboxyl) end."], "ts": 3832, "cat": "Nomenclature & Omega", "src": "Dr. Basso - Lecture · 63:52 · Naming: alpha & beta carbons from the COOH end"}, {"q": "Dr. Basso stressed that a fatty acid's carbons can be counted two different ways. Which pairing is correct?", "o": ["Greek letters (alpha, beta...) count from the methyl end; omega numbers count from the COOH end", "Greek letters (alpha, beta...) count from the COOH end; omega numbers count from the methyl end", "Both systems count from the COOH end", "Both systems count from the methyl end"], "c": 1, "r": ["✗ Reversed. Alpha and beta start at the carboxyl end, and omega counting starts at the methyl end.", "✓ The alpha carbon is adjacent to the COOH group (Greek letters count from the carboxyl end), whereas omega counting starts at the terminal methyl (omega) carbon.", "✗ The omega system counts from the methyl end, not the COOH end.", "✗ The alpha/beta (Greek) system counts from the COOH end, not the methyl end."], "ts": 3864, "cat": "Nomenclature & Omega", "src": "Dr. Basso - Lecture · 64:24 · Naming: alpha & beta carbons from the COOH end"}, {"q": "What did Dr. Basso identify as the 'omega carbon' of a fatty acid?", "o": ["The carboxylic acid (COOH) carbon", "The carbon adjacent to the COOH group", "The terminal (last) carbon, at the methyl end", "The carbon bearing the third double bond"], "c": 2, "r": ["✗ The COOH carbon is at the alpha (carboxyl) end, the opposite end from omega.", "✗ The carbon adjacent to COOH is the alpha carbon, not the omega carbon.", "✓ The terminal carbon at the methyl end is the omega carbon; the next one in is omega-2, and so on.", "✗ Double-bond position gives the omega NUMBER of the fatty acid; the omega CARBON itself is simply the last carbon."], "ts": 3848, "cat": "Nomenclature & Omega", "src": "Dr. Basso - Lecture · 64:08 · Naming: alpha & beta carbons from the COOH end"}, {"q": "According to Dr. Basso, how is a fatty acid classified as an omega-3 versus an omega-6?", "o": ["By the total number of double bonds in the chain", "By the total number of carbons in the chain", "By the position of the first double bond counted from the COOH end", "By the position of the first double bond counted from the methyl (omega) end"], "c": 3, "r": ["✗ The total number of double bonds does not set the omega class (EPA has 5 double bonds but is still omega-3).", "✗ Carbon count is given separately (the CX part of CX:Y); it does not set the omega number.", "✗ Omega counting starts at the methyl end, not the carboxyl (COOH) end.", "✓ The name comes from the first double bond counted from the omega (methyl) end: if it is at the third carbon, it is omega-3."], "ts": 3889, "cat": "Nomenclature & Omega", "src": "Dr. Basso - Lecture · 64:49 · Omega Fatty Acids: ALA, EPA, DHA, LA, AA"}, {"q": "Why did Dr. Basso stress that the omega-3 and omega-6 fatty acids are called 'essential'?", "o": ["Because the body makes them only in the liver", "Because we must obtain them from the diet since our bodies cannot make them", "Because they are the most abundant fatty acids in the plasma membrane", "Because they are needed only during infancy"], "c": 1, "r": ["✗ Essential fatty acids are not synthesized by the body at all (not even in the liver); that is why they must be eaten.", "✓ Omega-3 and omega-6 are essential because our bodies cannot make them, so they must come from food.", "✗ Membrane abundance is not the definition of 'essential'; essential means it must be supplied by the diet.", "✗ They are required throughout life, not only in infancy."], "ts": 3882, "cat": "Essential Fatty Acids & Eicosanoids", "src": "Dr. Basso - Lecture · 64:42 · Omega Fatty Acids: ALA, EPA, DHA, LA, AA"}, {"q": "Dr. Basso contrasted omega-9 fatty acids with omega-3 and omega-6. What did he say about omega-9s?", "o": ["They are essential because we cannot make them", "They are the only truly essential fatty acids", "They are not essential because our bodies can make them", "They cannot be found in any food source"], "c": 2, "r": ["✗ Omega-9s are not essential; that label belongs to omega-3 and omega-6.", "✗ The essential fatty acids are omega-3 and omega-6, not omega-9.", "✓ Omega-9s are not essential because the body can synthesize them on its own.", "✗ Whether they occur in food is beside the point; they are non-essential because the body makes them."], "ts": 4081, "cat": "Essential Fatty Acids & Eicosanoids", "src": "Dr. Basso - Lecture · 68:01 · Omega Fatty Acids: ALA, EPA, DHA, LA, AA"}, {"q": "Dr. Basso showed the shorthand 'C18:3' for alpha-linolenic acid and said it will be on the test. What does C18:3 mean?", "o": ["18 double bonds and 3 carbons", "carbon number 18 with a single double bond at position 3", "18 carbons and 3 double bonds", "18 carbons and 3 branch points"], "c": 2, "r": ["✗ Reversed. The first number is carbons, the second is double bonds.", "✗ C18:3 is not one position; 18 is the total carbons and 3 is the total number of double bonds.", "✓ The number before the colon is the carbon count (18) and the number after is the number of double bonds (3), so alpha-linolenic is C18:3.", "✗ The second number counts double bonds, not branch points; these chains are unbranched."], "ts": 3944, "cat": "Nomenclature & Omega", "src": "Dr. Basso - Lecture · 65:44 · Omega Fatty Acids: ALA, EPA, DHA, LA, AA"}, {"q": "Following the same shorthand, what would 'C18:0' tell you about a fatty acid?", "o": ["It has 18 double bonds", "It is unsaturated with one double bond", "It is an 'omega-0' fatty acid", "It is saturated, because the zero means no double bonds"], "c": 3, "r": ["✗ The 18 is the carbon count; the number after the colon (0) is the double-bond count.", "✗ A zero after the colon means no double bonds at all, so it is saturated, not unsaturated.", "✗ There is no 'omega-0'; the zero simply indicates no double bonds.", "✓ The zero after the colon means zero double bonds, so a C18:0 fatty acid is saturated."], "ts": 3958, "cat": "Nomenclature & Omega", "src": "Dr. Basso - Lecture · 65:58 · Omega Fatty Acids: ALA, EPA, DHA, LA, AA"}, {"q": "Dr. Basso said you should know eicosapentaenoic acid (EPA). How did he describe its structure and class?", "o": ["20 carbons, 5 double bonds, omega-3", "18 carbons, 2 double bonds, omega-6", "22 carbons, 6 double bonds, omega-3", "20 carbons, 0 double bonds, saturated"], "c": 0, "r": ["✓ EPA (eicosapentaenoic acid) has 20 carbons and 5 double bonds and is an omega-3.", "✗ Those are the numbers for linoleic acid (C18:2, omega-6), not EPA.", "✗ That describes DHA (22 carbons, 6 double bonds, omega-3), not EPA.", "✗ EPA is highly unsaturated (5 double bonds), not saturated."], "ts": 3966, "cat": "Essential Fatty Acids & Eicosanoids", "src": "Dr. Basso - Lecture · 66:06 · Omega Fatty Acids: ALA, EPA, DHA, LA, AA"}, {"q": "How did Dr. Basso describe DHA (docosahexaenoic acid)?", "o": ["18 carbons, 3 double bonds, omega-3", "22 carbons, 6 double bonds, omega-3", "20 carbons, 5 double bonds, omega-3", "24 carbons, 4 double bonds, omega-6"], "c": 1, "r": ["✗ Those are the numbers for alpha-linolenic acid (C18:3), not DHA.", "✓ DHA has 22 carbons and 6 double bonds and is an omega-3 ('hexa' = six double bonds).", "✗ That is EPA (20 carbons, 5 double bonds), not DHA.", "✗ DHA is 22 carbons with 6 double bonds and is omega-3, not omega-6."], "ts": 4041, "cat": "Nomenclature & Omega", "src": "Dr. Basso - Lecture · 67:21 · Omega Fatty Acids: ALA, EPA, DHA, LA, AA"}, {"q": "Dr. Basso described linoleic acid. What are its carbon count, double bonds, and omega class?", "o": ["20 carbons, 5 double bonds, omega-3", "18 carbons, 3 double bonds, omega-3", "18 carbons, 2 double bonds, omega-6", "22 carbons, 6 double bonds, omega-6"], "c": 2, "r": ["✗ That is EPA (an omega-3), not linoleic acid.", "✗ Those numbers (C18:3, omega-3) describe alpha-linolenic acid; linoleic acid has only 2 double bonds and is omega-6.", "✓ Linoleic acid is 18 carbons with 2 double bonds and is an omega-6.", "✗ That is DHA, not linoleic acid."], "ts": 4055, "cat": "Nomenclature & Omega", "src": "Dr. Basso - Lecture · 67:35 · Omega Fatty Acids: ALA, EPA, DHA, LA, AA"}, {"q": "Which fatty acid did Dr. Basso describe as 'really common in our plasma membranes' and classify as an omega-6?", "o": ["Eicosapentaenoic acid (EPA)", "Docosahexaenoic acid (DHA)", "Alpha-linolenic acid (ALA)", "Arachidonic acid"], "c": 3, "r": ["✗ EPA is an omega-3 he tied to brain and cardiovascular health, not the common membrane fatty acid.", "✗ DHA is an omega-3, not an omega-6.", "✗ Alpha-linolenic acid is an omega-3, not the omega-6 membrane fatty acid he named.", "✓ Arachidonic acid is the omega-6 he said is really common in our plasma membranes."], "ts": 4064, "cat": "Essential Fatty Acids & Eicosanoids", "src": "Dr. Basso - Lecture · 67:44 · Omega Fatty Acids: ALA, EPA, DHA, LA, AA"}, {"q": "Dr. Basso asked whether EPA, with its five double bonds, is a PUFA or a MUFA. What is the answer and why?", "o": ["PUFA, because 'poly' means many double bonds", "MUFA, because 'mono' refers to a single long chain", "MUFA, because it has one carboxyl group", "Neither, because it is a saturated fatty acid"], "c": 0, "r": ["✓ EPA is a PUFA (polyunsaturated) because 'poly' means many double bonds, and EPA has five.", "✗ MUFA means monounsaturated (one double bond); 'mono' does not refer to chain length.", "✗ The 'mono' in MUFA refers to a single double bond, not the number of carboxyl groups.", "✗ EPA has five double bonds, so it is highly unsaturated, not saturated."], "ts": 3988, "cat": "Saturated vs Unsaturated", "src": "Dr. Basso - Lecture · 66:28 · Omega Fatty Acids: ALA, EPA, DHA, LA, AA"}, {"q": "Dr. Basso told everyone to 'make notes here' and gave a memory trick for saturated fatty acids. What are his 'four S's'?", "o": ["Saturated, Single, Straight, Solid at room temperature", "Saturated, Soft, Short, Soluble", "Saturated, Single, Symmetrical, Sticky", "Saturated, Straight, Slippery, Sweet"], "c": 0, "r": ["✓ His four S's are Saturated = Single bonds, Straight chains (no bend), and Solid at room temperature.", "✗ Soft, Short, and Soluble were not his terms; the set is Saturated, Single, Straight, Solid.", "✗ Saturated and Single are right, but the other two are Straight and Solid, not Symmetrical or Sticky.", "✗ Straight is right, but the set is Saturated, Single, Straight, Solid, not Slippery or Sweet."], "ts": 4161, "cat": "Saturated vs Unsaturated", "src": "Dr. Basso - Lecture · 69:21 · Saturated Fatty Acids + HIS FOUR S's (red pen)"}, {"q": "Using the opposite of his four S's, how did Dr. Basso characterize UNSATURATED fatty acids?", "o": ["Single bonds, straight chains, solid at room temperature", "At least one double bond, a bend in the chain, and liquid at room temperature", "No double bonds, a bend in the chain, and solid at room temperature", "At least one double bond, straight chains, and liquid at room temperature"], "c": 1, "r": ["✗ Those are the properties of SATURATED fats (the four S's), not unsaturated.", "✓ Unsaturated fats have at least one double bond, which puts a bend in the chain, and they are liquid at room temperature.", "✗ Unsaturated fats DO have double bonds, and they are liquid (not solid) at room temperature.", "✗ The double bond creates a bend, so unsaturated chains are not straight."], "ts": 4281, "cat": "Saturated vs Unsaturated", "src": "Dr. Basso - Lecture · 71:21 · Unsaturated Fatty Acids: mono vs poly"}, {"q": "Dr. Basso listed examples of saturated fats and gave a general rule about their food sources. Which statement matches what he said?", "o": ["Saturated fats come only from plants; there are no animal sources", "All plant oils are saturated and all animal fats are unsaturated", "Saturated fats are mostly animal products (butter, cheese, milk, meat), with plant exceptions like palm oil and coconut oil", "Saturated fats always contain at least one double bond"], "c": 2, "r": ["✗ Backwards. Saturated fats are mostly animal products, though some plants (palm, coconut oil) are exceptions.", "✗ He said the opposite tendency: animal products tend to be saturated and plants tend to be unsaturated (with exceptions).", "✓ Saturated fats are mostly animal products (palmitic acid, butter, cheese, milk, meat), with plant exceptions such as palm oil and coconut oil.", "✗ Saturated fats have NO double bonds (all single bonds); that is the definition."], "ts": 4130, "cat": "Saturated vs Unsaturated", "src": "Dr. Basso - Lecture · 68:50 · Saturated Fatty Acids + HIS FOUR S's (red pen)"}, {"q": "Dr. Basso noted that coconut oil can be solid or liquid depending on the room temperature. What did he say this tells you about coconut oil?", "o": ["It contains both saturated and unsaturated fats", "It is purely saturated", "It is purely unsaturated", "It contains no fatty acids at all"], "c": 0, "r": ["✓ Because it can be solid or liquid depending on temperature, coconut oil must contain both saturated and unsaturated fats; most foods are a mix that is simply more saturated or more unsaturated.", "✗ If it were purely saturated it would stay solid; its variable state shows it is a mixture.", "✗ If it were purely unsaturated it would stay liquid; its variable state shows it is a mixture.", "✗ Coconut oil is made of fatty acids; the point is that it has a mix of saturated and unsaturated ones."], "ts": 4330, "cat": "Saturated vs Unsaturated", "src": "Dr. Basso - Lecture · 72:10 · Unsaturated Fatty Acids: mono vs poly"}, {"q": "Dr. Basso contrasts monounsaturated (MUFA) and polyunsaturated (PUFA) fatty acids by counting double bonds. How many carbon-carbon double bonds does a MUFA have?", "o": ["None - it is fully saturated", "More than one", "At least three", "Exactly one"], "c": 3, "r": ["✗ A fatty acid with zero double bonds is saturated, not monounsaturated.", "✗ 'More than one' double bond defines a PUFA (poly), not a MUFA.", "✗ Three or more double bonds is a polyunsaturated fatty acid, not a mono.", "✓ 'MUFAs only have one double bond' - the prefix mono means one."], "ts": 4401, "cat": "Saturated vs Unsaturated", "src": "Dr. Basso - Lecture · 73:21 · Unsaturated Fatty Acids: mono vs poly"}, {"q": "What makes the omega-3 and omega-6 fatty acids 'essential,' according to Dr. Basso?", "o": ["They are the only fatty acids the body can build de novo", "The body cannot synthesize them, so they must come from the diet", "They are saturated fats used mainly for long-term energy storage", "They are manufactured in the liver from cholesterol"], "c": 1, "r": ["✗ Backwards - essential fatty acids are the ones we CANNOT make; non-essential fats are what the body builds de novo.", "✓ His slide lists essential fatty acids as 'not synthesized' in the body, so as he puts it 'we need to eat them.'", "✗ The essential fatty acids are polyunsaturated, and the point here is dietary intake, not energy storage.", "✗ He never describes them as liver-made from cholesterol; the whole point is they are not synthesized at all."], "ts": 4441, "cat": "Essential Fatty Acids & Eicosanoids", "src": "Dr. Basso - Lecture · 74:01 · Essential Fatty Acids (omega 3, 6) pathways"}, {"q": "Dr. Basso says that once you eat an essential fatty acid, your body can 'modify our fatty acids de novo.' What kind of modification does he demonstrate?", "o": ["Adding carbon units (elongation) and adding double bonds (desaturation) to make them longer and more unsaturated", "Converting them directly into glucose for fuel", "Breaking them down into cholesterol", "Leaving them unchanged and simply storing them as triacylglycerols"], "c": 0, "r": ["✓ He shows elongase enzymes adding 2-carbon units and desaturases adding double bonds - 'we can modify fatty acids de novo.'", "✗ The pathways add carbons and double bonds; he never converts these fatty acids into glucose.", "✗ These modifications lengthen and desaturate the fatty acid; they do not produce cholesterol.", "✗ The whole point is active enzymatic modification, not leaving them unchanged."], "ts": 4510, "cat": "Essential Fatty Acids & Eicosanoids", "src": "Dr. Basso - Lecture · 75:10 · Essential Fatty Acids (omega 3, 6) pathways"}, {"q": "In the omega-6 pathway, Dr. Basso ends at a 20-carbon fatty acid he calls 'a big portion of our phospholipids in our plasma membranes.' Which fatty acid is it?", "o": ["Alpha-linolenic acid", "DHA (docosahexaenoic acid)", "Arachidonic acid", "EPA (eicosapentaenoic acid)"], "c": 2, "r": ["✗ Alpha-linolenic acid is the omega-3 parent you eat, not the omega-6 membrane end-product.", "✗ DHA is the end of the omega-3 pathway, not the omega-6 pathway.", "✓ The omega-6 pathway ends in arachidonic acid, which he stresses is 'a big portion of our phospholipids in our plasma membranes.'", "✗ EPA is an omega-3 product; the omega-6 membrane fatty acid he emphasizes is arachidonic acid."], "ts": 4497, "cat": "Essential Fatty Acids & Eicosanoids", "src": "Dr. Basso - Lecture · 74:57 · Essential Fatty Acids (omega 3, 6) pathways"}, {"q": "Starting from dietary alpha-linolenic acid, Dr. Basso traces the omega-3 pathway to two fatty acids he says are 'really good for you.' In order, which two are they?", "o": ["Arachidonic acid, then gamma-linolenic acid", "DHA first, then EPA", "Gamma-linolenic acid, then arachidonic acid", "EPA first, then DHA"], "c": 3, "r": ["✗ Both of these belong to the omega-6 pathway, not the omega-3 end-products.", "✗ Right molecules, wrong order - EPA forms first and is then modified further into DHA.", "✗ Gamma-linolenic and arachidonic acid are omega-6 pathway molecules.", "✓ The omega-3 pathway runs from alpha-linolenic acid through to EPA (eicosapentaenoic), then on to DHA (docosahexaenoic)."], "ts": 4579, "cat": "Essential Fatty Acids & Eicosanoids", "src": "Dr. Basso - Lecture · 76:19 · Essential Fatty Acids (omega 3, 6) pathways"}, {"q": "Flagging it as 'really important - listen up,' how does Dr. Basso generally characterize omega-6 versus omega-3 fatty acids?", "o": ["Both families are equally pro-inflammatory", "Omega-6 are anti-inflammatory; omega-3 are pro-inflammatory", "Omega-6 are generally pro-inflammatory; omega-3 are generally anti-inflammatory", "Neither family has any effect on inflammation"], "c": 2, "r": ["✗ He explicitly contrasts the two families - they are not equal.", "✗ Reversed - omega-6 tend to be pro-inflammatory and omega-3 anti-inflammatory.", "✓ 'omega-6s are pro-inflammatory... omega-3 fatty acids are less inflammatory... you could say they're anti-inflammatory.'", "✗ He ties both families directly to inflammatory pathways, so they clearly affect inflammation."], "ts": 4668, "cat": "Essential Fatty Acids & Eicosanoids", "src": "Dr. Basso - Lecture · 77:48 · Essential Fatty Acids (omega 3, 6) pathways"}, {"q": "A student concludes 'omega-6 is bad.' How does Dr. Basso correct that?", "o": ["Omega-6 is always harmful and should be eliminated from the diet", "Omega-6 itself isn't bad - the problem is getting too much of it (or having inflammatory conditions)", "Omega-6 is completely harmless in any amount", "Omega-6 is only harmful if eaten together with omega-3"], "c": 1, "r": ["✗ He explicitly says 'Omega-6 is not bad' and tells students not to 'hate on omega-6s.'", "✓ 'everything is bad if you get too much of it' - omega-6 becomes a problem in excess or with inflammatory issues like inflammatory arthritis.", "✗ He is clear that too much omega-6 CAN be harmful, so it is not harmless in any amount.", "✗ Omega-3 doesn't make omega-6 harmful; if anything omega-3 helps balance it."], "ts": 4756, "cat": "Essential Fatty Acids & Eicosanoids", "src": "Dr. Basso - Lecture · 79:16 · Essential Fatty Acids (omega 3, 6) pathways"}, {"q": "Dr. Basso says our dietary omega-6 to omega-3 ratio is 'out of whack.' What ratio should we aim for, and where does the Western diet actually sit?", "o": ["Aim for about 2 to 1 omega-6 to omega-3, but the Western diet runs closer to 8 to 1, up to 20 to 1", "Aim for 20 to 1 omega-6 to omega-3, which the Western diet already meets", "Aim for 1 to 1, but the Western diet runs about 2 to 1", "Aim for 8 to 1 omega-3 to omega-6, but the Western diet reverses it"], "c": 0, "r": ["✓ 'the ratio should be something like 2 to 1 omega-6 to omega-3... the Western diet is... Closer to 8 to 1, all the way up to 20 to 1.'", "✗ 20 to 1 is the extreme of the imbalance he warns about, not the healthy target.", "✗ He gives about 2 to 1 as the target, not 1 to 1, and the Western diet is far worse than 2 to 1.", "✗ The ratio is stated omega-6 to omega-3 with roughly a 2 to 1 target, not 8 to 1 reversed."], "ts": 4792, "cat": "Essential Fatty Acids & Eicosanoids", "src": "Dr. Basso - Lecture · 79:52 · Essential Fatty Acids (omega 3, 6) pathways"}, {"q": "Dr. Basso explains why Americans get too much omega-6. Which foods does he name as the omega-6-heavy staples of the American diet?", "o": ["Cold-water fish and flaxseed", "Walnuts, chia, and flaxseed oil", "Grains, pasta, and bread", "Leafy greens and berries"], "c": 2, "r": ["✗ Cold-water fish and flaxseed are his omega-3 sources, not omega-6.", "✗ Walnuts, chia, and flaxseed oil are the omega-3 sources he says to increase.", "✓ 'Where do we see omega-6 oils? Grains. Pasta. Bread... That's the American diet.'", "✗ He never names greens or berries here; the omega-6 staples he lists are grains, pasta, and bread."], "ts": 4829, "cat": "Essential Fatty Acids & Eicosanoids", "src": "Dr. Basso - Lecture · 80:29 · Essential Fatty Acids (omega 3, 6) pathways"}, {"q": "For a patient who wants more omega-3 but does not eat animal products, which source does Dr. Basso specifically call 'a really good source of omega-3s'?", "o": ["Cold-water (oily) fish", "Bread and pasta", "Beef", "Flaxseed oil"], "c": 3, "r": ["✗ Cold-water/oily fish is his omega-3 pick for people who DO eat animals.", "✗ Bread and pasta are omega-6 sources - the opposite of what's wanted.", "✗ He does not cite beef as an omega-3 source.", "✓ 'Flaxseed oil is a really good source of omega-3s if you don't want to eat animals' (walnuts and chia are the other plant options he names)."], "ts": 4928, "cat": "Essential Fatty Acids & Eicosanoids", "src": "Dr. Basso - Lecture · 82:08 · Essential Fatty Acids (omega 3, 6) pathways"}, {"q": "Dr. Basso invokes the saying 'you are what you eat.' What point is he making about dietary fatty acids?", "o": ["Dietary fats are all burned for energy and leave no structural mark", "The fatty acids you eat are built into your plasma membranes and help set their fluidity", "Dietary fats are converted entirely into cholesterol", "Only saturated fats can be incorporated into cell membranes"], "c": 1, "r": ["✗ His point is the opposite - the fats you eat DO leave a structural mark in your membranes.", "✓ 'whatever fatty acids you are eating... that's going to help make up your plasma membranes... and they maintain fluidity of the cell membrane.'", "✗ He says dietary fatty acids build membranes, not that they all become cholesterol.", "✗ No such restriction - even trans fats get incorporated, which is exactly the problem he goes on to describe."], "ts": 5560, "cat": "Lipid Properties & Function", "src": "Dr. Basso - Lecture · 92:40 · Essential FAs: membrane phospholipids, fluidity"}, {"q": "Using the now-banned trans fats as his example, what did Dr. Basso say happens to a plasma membrane built largely from trans fats?", "o": ["It becomes more fluid and more flexible", "It stops incorporating any dietary fatty acids", "It becomes more permeable to water", "It becomes more rigid and less flexible, which is unhealthy"], "c": 3, "r": ["✗ Opposite - trans fats made the membrane LESS fluid; you want it to be fluid.", "✗ Trans fats were still incorporated into the membrane; that is why they caused harm.", "✗ He describes rigidity and lost flexibility, not increased water permeability.", "✓ 'it made your membrane more rigid. It wasn't as flexible, and that's not healthy. You want it to be fluid.'"], "ts": 5586, "cat": "Cis vs Trans", "src": "Dr. Basso - Lecture · 93:06 · Essential FAs: membrane phospholipids, fluidity"}, {"q": "Objective 5 concerns eicosanoids. Consistent with Dr. Basso's lecture, eicosanoids are formed by modifying what type of fatty acid?", "o": ["A 2-carbon acetyl group", "A 20-carbon polyunsaturated fatty acid, such as arachidonic acid", "A 16-carbon saturated fatty acid", "A short-chain saturated fatty acid"], "c": 1, "r": ["✗ An acetyl (2-carbon) group is a building block for making fatty acids, not an eicosanoid precursor.", "✓ Eicosanoids ('eicosa' = 20) are built from 20-carbon polyunsaturated fatty acids like arachidonic acid, the omega-6 product he built up to 20 carbons and placed in the membrane.", "✗ Saturated 16-carbon fatty acids are not eicosanoid precursors; the precursor is polyunsaturated.", "✗ Short-chain saturated fatty acids are not modified into eicosanoids; the precursor is a 20-carbon PUFA."], "ts": 4497, "cat": "Essential Fatty Acids & Eicosanoids", "src": "Dr. Basso - Lecture · 74:57 · Essential Fatty Acids (omega 3, 6) pathways"}, {"q": "On the 'Omega Fatty Acids: Clinical Significance' point, what does Dr. Basso say omega-3 fatty acids do at the cell membrane?", "o": ["They reduce the arachidonic acid content in the membrane phospholipids of platelets, endothelial cells, and inflammatory cells", "They increase arachidonic acid in every membrane in the body", "They strip all phospholipids out of the membrane", "They convert membrane cholesterol into arachidonic acid"], "c": 0, "r": ["✓ 'Omega-3 fatty acids reduce the content of arachidonic acid in the membrane phospholipids, in platelets, endothelial cells, and inflammatory cells' - omega-3 substitutes in for the omega-6.", "✗ Opposite - omega-3 LOWERS membrane arachidonic acid by displacing the omega-6.", "✗ Omega-3 substitutes into phospholipids; it does not strip phospholipids out.", "✗ He describes displacing arachidonic acid, not converting cholesterol."], "ts": 5651, "cat": "Essential Fatty Acids & Eicosanoids", "src": "Dr. Basso - Lecture · 94:11 · Omega Fatty Acids: Clinical Significance"}, {"q": "Dr. Basso finds it 'interesting' that omega-3 - itself a fatty acid - does what to blood lipids, correlating with decreased cardiovascular risk?", "o": ["Raises serum triacylglycerols (tags)", "Has no measurable effect on blood tags", "Is associated with a decrease in serum triacylglycerols (tags)", "Converts blood tags directly into cholesterol"], "c": 2, "r": ["✗ Opposite - omega-3 is associated with a DECREASE in serum tags.", "✗ He specifically highlights an effect: lower blood tags.", "✓ 'it's actually a fatty acid, omega-3, but it's associated with a decrease in blood tags,' and it correlates with decreased cardiovascular risk.", "✗ He describes lowering tags (and remnant lipoproteins), not converting them into cholesterol."], "ts": 5623, "cat": "Essential Fatty Acids & Eicosanoids", "src": "Dr. Basso - Lecture · 93:43 · Essential FAs: membrane phospholipids, fluidity"}, {"q": "Returning to the essential fatty acids after the break, which two fatty acids does Dr. Basso name (noting their role as membrane phospholipids)?", "o": ["Arachidonic acid and EPA", "Linoleic and linolenic acid", "Gamma-linolenic and dihomogamma-linolenic acid", "EPA and DHA"], "c": 1, "r": ["✗ Arachidonic acid and EPA are downstream products of the pathways, not the two named essential fatty acids.", "✓ 'so linoleic and linolenic role as membrane phospholipids' - linoleic (omega-6) and linolenic (omega-3) are the essential fatty acids.", "✗ These are omega-6 pathway intermediates he told you NOT to memorize, not the parent essential fatty acids.", "✗ EPA and DHA are omega-3 end-products, not the two essential fatty acids he names here."], "ts": 5519, "cat": "Essential Fatty Acids & Eicosanoids", "src": "Dr. Basso - Lecture · 91:59 · Essential FAs: membrane phospholipids, fluidity"}, {"q": "In a cis carbon-carbon double bond, how are the two hydrogen atoms arranged?", "o": ["One hydrogen is on one side and the other is on the opposite side", "Both hydrogens are removed and replaced by oxygen", "The hydrogens are shared equally across the double bond", "Both hydrogens are on the same side of the double bond"], "c": 3, "r": ["✗ That describes a trans double bond, with a hydrogen on each opposite side.", "✗ The double bond is between carbons; the hydrogens are not replaced by oxygen.", "✗ Basso defined cis and trans by which side the hydrogens sit on, not by 'sharing' them.", "✓ Cis means both hydrogens are on the same side of the C=C, which is what produces the bend in the chain."], "ts": 5766, "cat": "Cis vs Trans", "src": "Dr. Basso - Lecture · 96:06 · Cis vs Trans Fatty Acids"}, {"q": "How does Dr. Basso define a trans carbon-carbon double bond?", "o": ["There is a hydrogen on one side and a hydrogen on the other side", "Both hydrogens sit on the same side of the double bond", "There are no hydrogens on the double-bonded carbons", "The double bond is fully saturated with hydrogens"], "c": 0, "r": ["✓ Trans means one hydrogen is on one side and the other hydrogen is on the opposite side of the double bond.", "✗ That is the cis configuration, which creates the bend in the chain.", "✗ The double-bonded carbons still carry hydrogens; it is their opposite-side position that defines trans.", "✗ A carbon-carbon double bond is by definition a point of unsaturation, not something 'fully saturated.'"], "ts": 5771, "cat": "Cis vs Trans", "src": "Dr. Basso - Lecture · 96:11 · Cis vs Trans Fatty Acids"}, {"q": "What does the trans configuration do to the shape of the fatty acid chain?", "o": ["It puts a sharp bend in the chain", "It coils the chain into a ring", "It straightens the chain out instead of leaving a bend", "It has no effect on the chain's shape"], "c": 2, "r": ["✗ The bend is characteristic of a cis double bond; trans does the opposite.", "✗ Basso never described a ring; he contrasted straight (trans) with bent (cis).", "✓ A trans double bond straightens the chain out instead of leaving the bend that a cis bond would create.", "✗ The whole point is that trans changes the shape, straightening it so it can pack like a saturated fat."], "ts": 5781, "cat": "Cis vs Trans", "src": "Dr. Basso - Lecture · 96:21 · Cis vs Trans Fatty Acids"}, {"q": "Dr. Basso stressed that although a trans fat is technically unsaturated, how does it actually behave?", "o": ["Like an essential omega-3 fatty acid", "Like a phospholipid in the membrane", "Like a molecule with no fat-like properties at all", "Like a saturated fatty acid"], "c": 3, "r": ["✗ Omega-3s bend and stay liquid; a trans fat does the opposite.", "✗ Phospholipids are a different lipid class; the point here is that trans acts like a saturated fat.", "✗ It is still a fat, it simply behaves like a saturated one.", "✓ Because the trans double bond straightens the chain, a trans fat, though technically unsaturated, behaves like a saturated fatty acid."], "ts": 5785, "cat": "Cis vs Trans", "src": "Dr. Basso - Lecture · 96:25 · Cis vs Trans Fatty Acids"}, {"q": "Why does Dr. Basso say saturated (and trans) fats were favored for products like cakes, cookies, snack chips, and fried foods?", "o": ["They are liquid at room temperature, making batter pourable", "They are solid at room temperature", "They add omega-3 fatty acids to the product", "They prevent any oxidation of the food"], "c": 1, "r": ["✗ It is the opposite; their solidity at room temperature is the useful property.", "✓ Saturated fats (and trans fats that mimic them) are solid at room temperature, which is why they were used in cakes, cookies, snack chips, and fried foods.", "✗ These fats are not a source of omega-3s; that is unrelated to why they were used.", "✗ Basso tied their use to being solid at room temperature, not to preventing oxidation."], "ts": 5796, "cat": "Cis vs Trans", "src": "Dr. Basso - Lecture · 96:36 · Cis vs Trans Fatty Acids"}, {"q": "On his Study Check slide, Dr. Basso asks how trans fats are created. What is the answer?", "o": ["Complete hydrogenation", "Oxidation of glycerol", "Partial hydrogenation", "Esterification with phosphate"], "c": 2, "r": ["✗ Complete hydrogenation would fully saturate the chain and give a saturated fat, not a trans fat.", "✗ Trans fats are not produced by oxidizing glycerol; the process is hydrogenation of the double bonds.", "✓ Partial hydrogenation is how trans fats are created; it leaves a hydrogen on one side and the other, forming the trans double bond.", "✗ Esterification with phosphate describes phospholipid assembly, not trans fat formation."], "ts": 6112, "cat": "Cis vs Trans", "src": "Dr. Basso - Lecture · 101:52 · Study Check: How are trans fats created?"}, {"q": "What health risks did Dr. Basso attribute to trans fats?", "o": ["Increased risk of cardiovascular disease and diabetes, by a clearly established mechanism", "Increased risk of cardiovascular disease and diabetes, though the mechanism is unclear", "Decreased risk of heart disease due to plaque stabilization", "No known health effects at any intake level"], "c": 1, "r": ["✗ He did name cardiovascular disease and diabetes, but he explicitly said the mechanism is unclear, not clearly established.", "✓ Basso said trans fats are detrimental, raising the risk of cardiovascular disease and diabetes, and added that the mechanism is unclear.", "✗ Plaque stabilization was a benefit he tied to omega-3s, not to trans fats, which increase cardiovascular risk.", "✗ He called trans fats detrimental to health, not harmless."], "ts": 6146, "cat": "Cis vs Trans", "src": "Dr. Basso - Lecture · 102:26 · Trans Fats and Health Risks"}, {"q": "Which of the following did Dr. Basso list as a food that contained trans fats from the hydrogenation process?", "o": ["Fresh spinach", "Grass-fed butter", "Coconut oil", "Vegetable shortening"], "c": 3, "r": ["✗ He never listed leafy greens; hydrogenation-derived trans fats came from processed products.", "✗ Grass-fed butter was his recommended alternative, not a hydrogenation-derived source.", "✗ Coconut oil was offered as a plant-oil alternative, not a hydrogenated trans fat source.", "✓ Vegetable shortening was on his hydrogenation-process list, along with deep-fried foods, baked goods, cookies, crackers, chips, and margarine."], "ts": 6217, "cat": "Cis vs Trans", "src": "Dr. Basso - Lecture · 103:37 · Trans Fatty Acids in Food"}, {"q": "Dr. Basso said trans fats can also occur naturally. Which food did he give as an example?", "o": ["Dairy such as milk and some yogurt", "Margarine", "Snack chips", "Vegetable shortening"], "c": 0, "r": ["✓ He gave dairy (milk and some yogurt) as naturally containing a small amount of trans fat, because cows are ruminant animals whose gut bacteria create some.", "✗ Margarine's trans fats came from hydrogenation, not from nature.", "✗ Snack chips got their trans fats from added hydrogenated fats, not naturally.", "✗ Vegetable shortening is a hydrogenation-derived source, not a natural one."], "ts": 5838, "cat": "Cis vs Trans", "src": "Dr. Basso - Lecture · 97:18 · Cis vs Trans Fatty Acids"}, {"q": "How did Dr. Basso explain what margarine is and why older margarine contained trans fats?", "o": ["It is churned animal butterfat that naturally forms trans fats", "It is a plant oil such as soybean oil that was hydrogenated, which created trans fats", "It is an omega-3-rich fish oil emulsion", "It is glycerol bonded to three saturated fatty acids"], "c": 1, "r": ["✗ Margarine is made from plant oil, not animal butterfat; it was pitched as a butter replacement.", "✓ Margarine is a plant oil like soybean oil that was hydrogenated, and that hydrogenation created trans fats.", "✗ It is not a fish-oil product; it is a hydrogenated plant oil.", "✗ That describes a generic triacylglycerol, not specifically margarine or why it held trans fats."], "ts": 5957, "cat": "Cis vs Trans", "src": "Dr. Basso - Lecture · 99:17 · Cis vs Trans Fatty Acids"}, {"q": "When Dr. Basso drew out 'your tag' (triacylglycerol), what three-part structure did he point to?", "o": ["A phosphate head, an amino alcohol, and two fatty acids", "A single fatty acid esterified to a cholesterol ring", "A glycerol backbone joined by ester linkages to three fatty acids", "A sphingosine backbone with a sugar and one fatty acid"], "c": 2, "r": ["✗ That describes a phospholipid, not a triacylglycerol.", "✗ A TAG has three fatty acids on glycerol, not one fatty acid on a cholesterol ring.", "✓ He pointed to three fatty acids connected by ester linkages (through the oxygen bond) to a glycerol backbone; that is the TAG.", "✗ That describes a glycosphingolipid, not a triacylglycerol."], "ts": 6095, "cat": "Triacylglycerols & Wax", "src": "Dr. Basso - Lecture · 101:35 · Fatty Acids in Triacylglycerols"}, {"q": "On the Cis vs Trans Fatty Acids slide, cis fatty acids are shown as the form found in natural whole foods. Which group are the cis-fat food examples?", "o": ["Almonds, avocados, bacon, and canola oil", "Margarine and vegetable shortening", "Cookies, crackers, and snack chips", "Deep-fried foods and baked goods"], "c": 0, "r": ["✓ The slide lists natural whole foods, such as almonds, avocados, bacon, and canola oil, as sources of cis (bent) fatty acids.", "✗ Margarine and shortening are hydrogenation-derived trans fat sources, not cis whole foods.", "✗ These processed snacks were classic trans fat carriers, not the cis examples.", "✗ Deep-fried and baked goods fall on the trans/hydrogenation side, not the cis side."], "ts": 5968, "cat": "Cis vs Trans", "src": "Dr. Basso - Lecture · 99:28 · Cis vs Trans Fatty Acids"}, {"q": "On the Omega Fatty Acids: Clinical Significance slide, what effect did Dr. Basso say omega-3s have on platelets?", "o": ["They increase platelet aggregation, making blood stickier", "They have no measurable effect on platelets", "They decrease platelet aggregation, so blood is less sticky and less likely to clot", "They destroy platelets, causing bleeding"], "c": 2, "r": ["✗ It is the reverse; omega-3s reduce aggregation, making blood less sticky.", "✗ He described a clear effect: reduced aggregation, improved rheology, and better perfusion.", "✓ Basso said omega-3s lower platelet aggregation, so blood is less sticky, rheology improves, and clots are less likely.", "✗ Omega-3s reduce aggregation; he did not say they destroy platelets."], "ts": 5741, "cat": "Essential Fatty Acids & Eicosanoids", "src": "Dr. Basso - Lecture · 95:41 · Omega Fatty Acids: Clinical Significance"}, {"q": "According to Dr. Basso, every phospholipid is assembled from the same set of building blocks. Which set correctly lists them?", "o": ["Three fatty acids attached to a glycerol backbone only", "A ceramide joined to a carbohydrate", "Two fatty acids and a phosphate, with no alcohol at all", "An alcohol, the fatty acids, a phosphate, and an amino alcohol"], "c": 3, "r": ["✗ That is the makeup of a triacylglycerol, not a phospholipid; a phospholipid must also carry a phosphate and an amino alcohol.", "✗ Ceramide plus a carbohydrate defines a glycolipid, not a phospholipid.", "✗ Every phospholipid does contain an alcohol backbone, so leaving it out is wrong.", "✓ Dr. Basso lists the four parts shared by every phospholipid as an alcohol, the fatty acids, a phosphate, and an amino alcohol."], "ts": 6316, "cat": "Phospholipids & Sphingolipids", "src": "Dr. Basso - Lecture · 105:16 · Phospholipid Types: glycero- vs sphingo-"}, {"q": "Dr. Basso says phospholipids come in two subtypes, and the name of each depends on one specific component. Which pairing follows his rule?", "o": ["Glycerol as the alcohol makes a sphingophospholipid", "Sphingosine as the alcohol makes a glycerophospholipid", "Glycerol makes a glycerophospholipid and sphingosine makes a sphingophospholipid", "The number of fatty acids decides the subtype name"], "c": 2, "r": ["✗ This reverses the rule; glycerol gives a glycerophospholipid, not a sphingophospholipid.", "✗ This reverses the rule; sphingosine gives a sphingophospholipid, not a glycerophospholipid.", "✓ The subtype is named for its alcohol: glycerol yields a glycerophospholipid and sphingosine yields a sphingophospholipid.", "✗ The subtype is set by the identity of the alcohol, not by how many fatty acids are attached."], "ts": 6305, "cat": "Phospholipids & Sphingolipids", "src": "Dr. Basso - Lecture · 105:05 · Phospholipid Types: glycero- vs sphingo-"}, {"q": "Phosphatidyl choline, also called lecithin, is Dr. Basso's example of a glycerophospholipid. Which components make it up?", "o": ["Sphingosine, one fatty acid, a phosphate, and choline", "Glycerol, two fatty acids, a phosphate, and choline as the amino alcohol", "Ceramide plus a single monosaccharide", "Glycerol with three fatty acids and no phosphate"], "c": 1, "r": ["✗ Sphingosine is the alcohol of sphingomyelin, not of lecithin; lecithin is built on glycerol.", "✓ Phosphatidyl choline (lecithin) is glycerol plus two fatty acids, a phosphate, and choline as its amino alcohol.", "✗ Ceramide plus a sugar describes a glycolipid, not lecithin.", "✗ A phospholipid must contain a phosphate, and lecithin carries two fatty acids, not three."], "ts": 6362, "cat": "Phospholipids & Sphingolipids", "src": "Dr. Basso - Lecture · 106:02 · Phospholipid Types (filled: lecithin / sphingomyelin)"}, {"q": "Dr. Basso flagged this as one to know for sure: what is the physiological role of dipalmitoyl lecithin?", "o": ["It forms a large portion of the myelin sheath", "It accumulates inside the neurons in Tay-Sachs disease", "It is the oligosaccharide carried by a ganglioside", "It is the lung surfactant that lowers alveolar surface tension and keeps the alveoli from collapsing"], "c": 3, "r": ["✗ That role belongs to sphingomyelin, which makes up much of the myelin sheath.", "✗ GM2 ganglioside is what accumulates in Tay-Sachs, not dipalmitoyl lecithin.", "✗ Gangliosides carry an oligosaccharide; dipalmitoyl lecithin is a phospholipid, not a sugar.", "✓ Dr. Basso stresses that dipalmitoyl lecithin is the lung surfactant, lowering the surface tension of the alveoli so they do not collapse."], "ts": 6383, "cat": "Phospholipids & Sphingolipids", "src": "Dr. Basso - Lecture · 106:23 · Lecithin: dipalmitoyl lecithin = LUNG SURFACTANT"}, {"q": "In lab, Dr. Basso tied lecithin to respiratory distress syndrome (RDS) in a newborn. Why does a premature infant develop RDS?", "o": ["The infant made too much surfactant and over-inflated the alveoli", "The surfactant did not have a chance to develop, so the alveoli tend to collapse", "Excess sphingomyelin flooded the lungs", "A missing enzyme let GM2 ganglioside build up in the lungs"], "c": 1, "r": ["✗ RDS is a shortage of surfactant, not an excess of it.", "✓ In a premature infant the surfactant has not yet developed, so surface tension stays high and the alveoli tend to collapse.", "✗ Sphingomyelin buildup is the mechanism of Niemann-Pick, not of infant RDS.", "✗ GM2 ganglioside accumulation drives Tay-Sachs, not RDS."], "ts": 6403, "cat": "Phospholipids & Sphingolipids", "src": "Dr. Basso - Lecture · 106:43 · Lecithin: dipalmitoyl lecithin = LUNG SURFACTANT"}, {"q": "Sphingomyelin is Dr. Basso's example of the second phospholipid subtype. What is its alcohol, and which subtype does that make it?", "o": ["Glycerol, which makes it a glycerophospholipid", "Choline, which makes it a glycolipid", "Sphingosine, which makes it a sphingophospholipid", "Ceramide, which makes it a cerebroside"], "c": 2, "r": ["✗ Glycerol is the alcohol of lecithin, not of sphingomyelin.", "✗ Choline is the amino alcohol in sphingomyelin, not its backbone alcohol, and sphingomyelin is a phospholipid, not a glycolipid.", "✓ Sphingomyeli
