n uses sphingosine as its alcohol, which classifies it as a sphingophospholipid.", "✗ Ceramide plus a sugar defines a cerebroside; sphingomyelin instead carries a phosphate and choline."], "ts": 6497, "cat": "Phospholipids & Sphingolipids", "src": "Dr. Basso - Lecture · 108:17 · Sphingomyelin: sphingosine + FA + phosphate + choline"}, {"q": "Dr. Basso said to definitely know this: what is the physiological relevance of sphingomyelin?", "o": ["It is the lung surfactant", "It is stored as a ganglioside in the gray matter", "It carries a single monosaccharide in the brain", "It makes up a large portion of the myelin sheath that insulates the axons"], "c": 3, "r": ["✗ The lung surfactant is dipalmitoyl lecithin, not sphingomyelin.", "✗ Gangliosides sit in the gray matter; sphingomyelin is a phospholipid of the myelin sheath.", "✗ Carrying one sugar describes a cerebroside, not sphingomyelin.", "✓ Dr. Basso says to definitely know that sphingomyelin forms a large portion of the myelin sheath that insulates the axons."], "ts": 6507, "cat": "Phospholipids & Sphingolipids", "src": "Dr. Basso - Lecture · 108:27 · Sphingomyelin: large portion of the MYELIN SHEATH"}, {"q": "Using his computer-wire analogy, why does Dr. Basso say a myelinated axon transmits an impulse faster than an unmyelinated pain fiber?", "o": ["Myelin acts like the rubber insulation on a wire, keeping the impulse flowing without losing its power, so the signal travels faster", "Myelin adds extra sodium channels all along the length of the axon to boost the current", "Unmyelinated fibers contain more sphingomyelin, which is what slows them down", "Myelin converts the electrical signal into a chemical one that moves faster"], "c": 0, "r": ["✓ Dr. Basso compares myelin to the rubber around a wire: it keeps the electrical impulse flowing without losing power, so a myelinated axon fires faster than an unmyelinated pain fiber.", "✗ He describes myelin as insulation, not as a source of extra sodium channels.", "✗ Unmyelinated fibers have little or no sphingomyelin, which is exactly why they conduct slowly.", "✗ The impulse he describes stays electrical; myelin simply keeps it from leaking away."], "ts": 6546, "cat": "Phospholipids & Sphingolipids", "src": "Dr. Basso - Lecture · 109:06 · Sphingomyelin: large portion of the MYELIN SHEATH"}, {"q": "How does Dr. Basso define a glycolipid, and what alcohol does it still contain?", "o": ["Ceramide plus a carbohydrate, and the alcohol is still sphingosine", "Glycerol plus a phosphate, with glycerol as the alcohol", "Two fatty acids plus choline, with choline as the alcohol", "A phosphate plus an amino alcohol, with no sugar attached"], "c": 0, "r": ["✓ Dr. Basso defines a glycolipid as ceramide plus a carbohydrate, and it still uses sphingosine as its alcohol.", "✗ A phosphate and glycerol describe a glycerophospholipid, not a glycolipid.", "✗ Choline is an amino alcohol found in lecithin and sphingomyelin, and glycolipids carry a sugar rather than choline.", "✗ Glycolipids have no phosphate; the defining feature is the attached carbohydrate."], "ts": 6591, "cat": "Phospholipids & Sphingolipids", "src": "Dr. Basso - Lecture · 109:51 · Glycolipids: ceramide + carbohydrate"}, {"q": "What is the key structural difference between a cerebroside and a ganglioside?", "o": ["A cerebroside carries an oligosaccharide while a ganglioside carries a single monosaccharide", "A cerebroside carries one monosaccharide such as glucose or galactose, while a ganglioside carries an oligosaccharide", "A cerebroside contains glycerol while a ganglioside contains sphingosine", "A cerebroside has a phosphate while a ganglioside has choline"], "c": 1, "r": ["✗ This is reversed; the cerebroside has the single sugar and the ganglioside has the oligosaccharide.", "✓ Cerebrosides carry one monosaccharide (glucose or galactose), whereas gangliosides carry an oligosaccharide of roughly three to eight sugars.", "✗ Both are glycolipids built on sphingosine, so glycerol does not distinguish them.", "✗ Neither is defined by a phosphate or by choline; both are glycolipids that differ in how many sugars they carry."], "ts": 6631, "cat": "Phospholipids & Sphingolipids", "src": "Dr. Basso - Lecture · 110:31 · Cerebrosides vs Gangliosides"}, {"q": "Where does Dr. Basso locate cerebrosides versus gangliosides in the body?", "o": ["Cerebrosides in the gray matter; gangliosides in the myelin", "Cerebrosides in the lung alveoli; gangliosides in bone", "Cerebrosides in the myelin, brain and nerves; gangliosides in the gray matter of the brain", "Both are found only in the liver and spleen"], "c": 2, "r": ["✗ This is reversed; cerebrosides go with myelin and gangliosides with the gray matter.", "✗ The alveoli involve surfactant (lecithin), so this pairing is wrong.", "✓ Dr. Basso places cerebrosides in the myelin, brain and nerves, and gangliosides in the gray matter of the brain.", "✗ Cerebrosides do also appear in spleen, liver and bone, but their hallmark site is myelin and gangliosides sit in gray matter, so 'only liver and spleen' is wrong."], "ts": 6658, "cat": "Phospholipids & Sphingolipids", "src": "Dr. Basso - Lecture · 110:58 · Cerebrosides vs Gangliosides"}, {"q": "Tay-Sachs, Gaucher, and Niemann-Pick are grouped as lysosomal storage disorders. Using Dr. Basso's dam analogy, what happens when the responsible enzyme is missing or faulty?", "o": ["The downstream product overflows and is excreted", "The lysosome simply makes extra enzyme to compensate", "The membrane phospholipids convert into glycolipids", "The upstream substrate builds up, just like water backing up behind a blocked dam"], "c": 3, "r": ["✗ With the enzyme blocked the downstream product is not made; it is the upstream material that accumulates.", "✗ In these disorders the enzyme is missing or faulty and is not replaced, which is why the substrate piles up.", "✗ No such conversion occurs; the problem is undigested lipid stored in the lysosome.", "✓ Dr. Basso uses the dam analogy: block the enzyme and the upstream substrate backs up and accumulates in the lysosome."], "ts": 6925, "cat": "Lysosomal Storage Diseases", "src": "Dr. Basso - Lecture · 115:25 · Missing or Faulty Enzymes: Tay-Sachs / Gaucher / Niemann-Pick"}, {"q": "In Tay-Sachs disease, which enzyme is defective and what accumulates as a result?", "o": ["Sphingomyelinase is defective, so sphingomyelin accumulates", "Glucocerebrosidase is defective, so glucocerebroside accumulates", "Hexosaminidase A (hex A) is defective, so GM2 ganglioside accumulates and crowds the neuron cell bodies", "Hexosaminidase A is defective, but glucocerebroside is what accumulates"], "c": 2, "r": ["✗ That enzyme and substrate belong to Niemann-Pick, not Tay-Sachs.", "✗ That enzyme and substrate belong to Gaucher, not Tay-Sachs.", "✓ In Tay-Sachs the hex A enzyme is faulty, so GM2 ganglioside builds up and crowds out the neuron cell bodies, driving the CNS signs.", "✗ The enzyme is right, but the material that accumulates in Tay-Sachs is GM2 ganglioside, not glucocerebroside."], "ts": 6823, "cat": "Lysosomal Storage Diseases", "src": "Dr. Basso - Lecture · 113:43 · Missing or Faulty Enzymes: Tay-Sachs / Gaucher / Niemann-Pick"}, {"q": "Which enzyme deficiency causes Gaucher disease, and what lipid builds up?", "o": ["Hexosaminidase A is missing; GM2 ganglioside builds up", "Glucocerebrosidase is missing; glucocerebroside builds up", "Sphingomyelinase is missing; sphingomyelin builds up", "Glucocerebrosidase is missing, but sphingomyelin builds up"], "c": 1, "r": ["✗ That pairing is Tay-Sachs, not Gaucher.", "✓ Gaucher comes from a faulty glucocerebrosidase, so glucocerebroside accumulates upstream.", "✗ That pairing is Niemann-Pick, not Gaucher.", "✗ The enzyme is right, but blocking glucocerebrosidase backs up glucocerebroside, not sphingomyelin."], "ts": 6860, "cat": "Lysosomal Storage Diseases", "src": "Dr. Basso - Lecture · 114:20 · Missing or Faulty Enzymes: Tay-Sachs / Gaucher / Niemann-Pick"}, {"q": "Niemann-Pick disease results from a deficiency of which enzyme, leading to buildup of which lipid?", "o": ["Sphingomyelinase deficiency; sphingomyelin builds up", "Glucocerebrosidase deficiency; glucocerebroside builds up", "Hexosaminidase A deficiency; GM2 ganglioside builds up", "Sphingomyelinase deficiency, but glucocerebroside builds up"], "c": 0, "r": ["✓ Niemann-Pick is a faulty sphingomyelinase, so sphingomyelin accumulates upstream.", "✗ That pairing is Gaucher, not Niemann-Pick.", "✗ That pairing is Tay-Sachs, not Niemann-Pick.", "✗ The enzyme is right, but blocking sphingomyelinase backs up sphingomyelin, not glucocerebroside."], "ts": 6868, "cat": "Lysosomal Storage Diseases", "src": "Dr. Basso - Lecture · 114:28 · Missing or Faulty Enzymes: Tay-Sachs / Gaucher / Niemann-Pick"}, {"q": "Dr. Basso gave a test tip: a patient has a cherry-red spot and central nervous system symptoms but NO hepatosplenomegaly. Which disease is most likely?", "o": ["Gaucher disease", "Niemann-Pick disease", "Central retinal artery occlusion", "Tay-Sachs disease"], "c": 3, "r": ["✗ Gaucher shows hepatosplenomegaly, so it does not fit a case that lacks it.", "✗ Niemann-Pick also shows hepatosplenomegaly, so it does not fit a case without it.", "✗ This is a cause of a cherry-red spot in his mnemonic, but it is not a lysosomal storage disease with CNS lipid accumulation.", "✓ His test tip: a cherry-red spot with CNS symptoms and no hepatosplenomegaly points to Tay-Sachs, which stays in the central nervous system."], "ts": 7090, "cat": "Lysosomal Storage Diseases", "src": "Dr. Basso - Lecture · 118:10 · Lipid Breakdown Deficiencies: LYSOSOMAL STORAGE (full)"}, {"q": "A cherry-red spot can appear in more than one of these diseases. Which finding does Dr. Basso use to tell Tay-Sachs apart from Gaucher and Niemann-Pick?", "o": ["Only Tay-Sachs shows hepatosplenomegaly", "Gaucher and Niemann-Pick show hepatosplenomegaly, whereas Tay-Sachs tends not to because it is more CNS-centered", "Only Tay-Sachs shows a cherry-red spot", "None of the three ever involves the liver or spleen"], "c": 1, "r": ["✗ The opposite is true; Tay-Sachs tends to spare the liver and spleen.", "✓ Gaucher and Niemann-Pick both show hepatosplenomegaly, while Tay-Sachs usually does not because it is centered in the central nervous system.", "✗ A cherry-red spot can appear in several of these diseases, so it does not single out Tay-Sachs.", "✗ Gaucher and Niemann-Pick clearly do involve the liver and spleen, so this is false."], "ts": 7066, "cat": "Lysosomal Storage Diseases", "src": "Dr. Basso - Lecture · 117:46 · Lipid Breakdown Deficiencies: LYSOSOMAL STORAGE (full)"}, {"q": "Dr. Basso ranked how likely these are to appear on a board exam. What order did he give, most likely first?", "o": ["Gaucher, then Niemann-Pick, then Tay-Sachs", "Niemann-Pick, then Tay-Sachs, then Gaucher", "Tay-Sachs, then Niemann-Pick, then Gaucher", "Tay-Sachs, then Gaucher, then Niemann-Pick"], "c": 2, "r": ["✗ This is the reverse of his ranking; he put Gaucher last, not first.", "✗ He put Tay-Sachs first, not Niemann-Pick.", "✓ Dr. Basso ranked board likelihood as Tay-Sachs first, then Niemann-Pick, then Gaucher.", "✗ He placed Niemann-Pick ahead of Gaucher, so this order is flipped at the end."], "ts": 7115, "cat": "Lysosomal Storage Diseases", "src": "Dr. Basso - Lecture · 118:35 · Missing or Faulty Enzymes: Tay-Sachs / Gaucher / Niemann-Pick"}, {"q": "What is Dr. Basso's mnemonic 'Cherry trees never grow tall in sand' meant to help you remember?", "o": ["The steps of the COX cascade", "The components of the myelin sheath", "The order of fatty acid nomenclature", "The conditions that can cause a cherry-red spot in the eye"], "c": 3, "r": ["✗ The COX cascade is a separate topic he marked as not testable, not what this mnemonic covers.", "✗ The myelin sheath is built from sphingomyelin and cerebrosides, unrelated to this phrase.", "✗ Fatty acid nomenclature is a different objective, not the point of this phrase.", "✓ Dr. Basso uses the phrase Cherry trees never grow tall in sand to remember the conditions that can cause a cherry-red spot in the eye."], "ts": 6792, "cat": "Lysosomal Storage Diseases", "src": "Dr. Basso - Lecture · 113:12 · Lipid Breakdown Deficiencies: LYSOSOMAL STORAGE (full)"}], "objectives": ["Outline the general structure of triacylglycerols (aka triglycerides) and indicate their function.", "Indicate the structure of saturated and unsaturated fatty acids.", "Explain fatty acid nomenclature.", "Understand the difference between cis and trans carbon-carbon double bonds.", "Describe how eicosanoids are formed by modification of the structure of unsaturated fatty acids.", "Outline the general structure of phospholipids and glycosphingolipids and indicate the functions of the different classes."]};
function mmss(s){return Math.floor(s/60)+':'+(s%60<10?'0':'')+(s%60);}
function ccPlayAt(el,sec){var go=function(){try{el.currentTime=sec;}catch(e){}var p=el.play();if(p&&p.catch)p.catch(function(){});};
 if(el.readyState>=1)go(); else {el.addEventListener('loadedmetadata',go,{once:true});el.addEventListener('canplay',go,{once:true});try{el.load();}catch(e){}}}
function ccAud(sec){var v=document.getElementById('ccvid');try{v.pause();}catch(e){}
 ccPlayAt(document.getElementById('ccaud'),sec);document.querySelector('.player').scrollIntoView({behavior:'smooth',block:'start'});}
function ccVid(sec){var a=document.getElementById('ccaud');try{a.pause();}catch(e){}
 document.getElementById('ccvidwrap').style.display='block';
 ccPlayAt(document.getElementById('ccvid'),sec);document.querySelector('.player').scrollIntoView({behavior:'smooth',block:'start'});}
function ccHideVid(){var v=document.getElementById('ccvid');try{v.pause();}catch(e){}document.getElementById('ccvidwrap').style.display='none';}
function ccRate(r,btn){r=Math.max(0.5,Math.min(3,r));
 document.getElementById('ccaud').playbackRate=r;document.getElementById('ccvid').playbackRate=r;
 var bs=document.querySelectorAll('.spd');for(var i=0;i<bs.length;i++){if(bs[i].textContent.indexOf('x')>-1)bs[i].classList.remove('on');}
 if(btn)btn.classList.add('on');}
function ccTab(p,btn){var ps=document.querySelectorAll('.pane');for(var i=0;i<ps.length;i++)ps[i].classList.remove('on');
 document.getElementById('p-'+p).classList.add('on');
 var ts=document.querySelectorAll('.tab');for(var i=0;i<ts.length;i++)ts[i].classList.remove('on');btn.classList.add('on');}

document.getElementById('objlist').innerHTML=D.objectives.map(function(o){return '<li>'+o+'</li>';}).join('');

document.getElementById('blitzlist').innerHTML=D.blitz.map(function(b){
  return '<div class="card"><div class="bt">'+b[0]+

document.getElementById('cuelist').innerHTML=D.cues.map(function(c){

    '<button class="ab" onclick="ccAud('+c.sec+')">&#127911; '+c.t+'</button>'+

document.getElementById('nopelist').innerHTML='<div class="card nope"><div class="bt">&#9940; He told you to SKIP these</div>'+
  D.nope.map(function(n){return '<div class="bd"><b>'+n.topic+'</b><br><span class="nopeq">"'+n.quote+'"</span> '+
    '<button class="ab" onclick="ccAud('+n.sec+')">&#127911; '+n.t+'</button></div>';}).join('')+'</div>';

var order=[],qi=0,score=0,answered=false;
function shuffle(a){for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}return a;}
function newRun(){order=shuffle(D.drill.map(function(_,i){return i;}));qi=0;score=0;drawQ();}
function drawQ(){
  if(qi>=order.length){document.getElementById('qbox').innerHTML='<div class="qq">Done. '+score+' / '+order.length+'</div>'+
    '<div class="qfoot"><button class="btn p" onclick="newRun()">Go again</button></div>';return;}
  answered=false;var q=D.drill[order[qi]];
  document.getElementById('qbox').innerHTML='<div class="qcat">'+q.cat+'</div><div class="qq">'+q.q+'</div>'+
    q.o.map(function(o,j){return '<button class="opt" data-j="'+j+'" onclick="pick('+j+')">'+String.fromCharCode(65+j)+'. '+o+'</button>';}).join('')+
    '<div class="rat" id="rat">'+q.r.map(function(r){return '<div>'+r+'</div>';}).join('')+
    '<div style="color:#94a3b8;font-size:.76rem;margin-top:8px">'+q.src+'</div></div>'+
    '<div class="qfoot"><button class="btn" onclick="ccAud('+q.ts+')">&#127911; Play from here</button>'+
    '<button class="btn" onclick="ccVid('+q.ts+')">&#127916; Watch</button>'+
    '<button class="btn p" onclick="nextQ()">Next &#9197;</button>'+
    '<span class="score">'+(qi+1)+' / '+order.length+' &middot; '+score+' right</span></div>';}
function pick(j){
  if(answered)return; answered=true;
  var q=D.drill[order[qi]];var os=document.querySelectorAll('#qbox .opt');
  for(var n=0;n<os.length;n++){var bj=+os[n].getAttribute('data-j');
    if(bj===q.c)os[n].classList.add('right'); else if(bj===j)os[n].classList.add('wrong');}
  if(j===q.c)score++;
  document.getElementById('rat').classList.add('show');
  var s=document.querySelector('.score');if(s)s.textContent=(qi+1)+' / '+order.length+' \u00b7 '+score+' right';}
function nextQ(){qi++;drawQ();}
newRun();

<script id="fab-ai-companion-js">
(function(){
  const ENDPOINT = "https://fab-ai.dgync1.workers.dev";
  const CLASS_NAME = "BN0213"; // e.g., "CP1" / "FAB101" / "GA0102" — empty = generic chiropractic tutor
  let panel = null;
  let history = []; // [{role:'user'|'model', content}]
  let currentQKey = null; // to detect Q navigation

  function readCurrentQ() {
    const qText = (document.querySelector('.q-text')?.innerText || '').replace(/^Q\d+(\s+of\s+\d+)?:\s*/, '');
    const optBtns = Array.from(document.querySelectorAll('.opt-btn'));
    const options = optBtns.map(b => {
      const clone = b.cloneNode(true);
      clone.querySelectorAll('.rationale').forEach(r => r.remove());
      clone.querySelectorAll('.letter').forEach(r => r.remove());
      return clone.innerText.trim();
    });
    let picked = null, correct = null;
    optBtns.forEach((b, i) => {
      if (b.classList.contains('picked-correct') || b.classList.contains('picked-wrong')) picked = i;
      if (b.classList.contains('picked-correct') || b.classList.contains('show-correct')) correct = i;
    });
    const profTip = document.querySelector('.prof-tip')?.innerText?.replace(/^Professor:\s*/i, '').trim() || '';
    const source = document.querySelector('.source-line')?.innerText?.replace(/^Source:\s*/i, '').trim() || '';
    const quote = document.querySelector('.quote-line')?.innerText?.trim() || '';
    return { question: qText, options, picked, correct, profTip, source, quote };
  }

  function qKey(ctx){ return (ctx.question || '') + '|' + (ctx.options || []).join('|'); }

  function mdToHtml(md){
    let html = md
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
      .replace(/(^|\n)### (.+)/g, '$1<h3>$2</h3>')
      .replace(/`([^`]+)`/g, '<code>$1</code>')
      .replace(/^\s*[-*]\s+(.+)$/gm, '<li>$1</li>')
      .replace(/(<li>.*?<\/li>(\s*<li>.*?<\/li>)*)/gs, '<ul>$1</ul>');
    html = html.split(/\n{2,}/).map(p => {
      if (p.trim().startsWith('<ul') || p.trim().startsWith('<h3')) return p;
      if (p.trim() === '') return '';
      return '<p>' + p.replace(/\n/g, '<br>') + '</p>';
    }).join('');
    return html;
  }

  function stripForTts(text){
    // Remove markdown markers so TTS doesn't read them aloud
    return text
      .replace(/\*\*/g, '')
      .replace(/`([^`]+)`/g, '$1')
      .replace(/^\s*[-*]\s+/gm, '')
      .replace(/^#+\s+/gm, '')
      .replace(/\n{2,}/g, '. ')
      .replace(/\s+/g, ' ')
      .trim();
  }

  let currentUtter = null;
  function speakToggle(btn, rawText){
    if (!window.speechSynthesis) {
      alert('Your browser does not support text-to-speech.');
      return;
    }
    if (window.speechSynthesis.speaking && currentUtter && btn.classList.contains('playing')) {
      window.speechSynthesis.cancel();
      document.querySelectorAll('.fab-ai-tts-btn.playing').forEach(b => {
        b.classList.remove('playing');
        b.innerHTML = '🔊 Read';
      });
      currentUtter = null;
      return;
    }
    window.speechSynthesis.cancel();
    document.querySelectorAll('.fab-ai-tts-btn.playing').forEach(b => {
      b.classList.remove('playing');
      b.innerHTML = '🔊 Read';
    });
    const u = new SpeechSynthesisUtterance(stripForTts(rawText));
    const rateSel = btn.parentElement.querySelector('.fab-ai-tts-rate');
    u.rate = parseFloat(rateSel && rateSel.value || '1.0');
    /*ava-tts*/try{var _vs=(window.speechSynthesis&&window.speechSynthesis.getVoices())||[];var _av=_vs.find(function(v){return /microsoft.*ava.*natural/i.test(v.name);})||_vs.find(function(v){return /microsoft.*emma.*natural/i.test(v.name);})||_vs.find(function(v){return /google us english female/i.test(v.name);});if(_av){u.voice=_av;u.lang=_av.lang||'en-US';}}catch(e){}
    u.onend = () => {
      btn.classList.remove('playing');
      btn.innerHTML = '🔊 Read';
      currentUtter = null;
    };
    u.onerror = () => {
      btn.classList.remove('playing');
      btn.innerHTML = '🔊 Read';
      currentUtter = null;
    };
    currentUtter = u;
    btn.classList.add('playing');
    btn.innerHTML = '⏹ Stop';
    window.speechSynthesis.speak(u);
  }

  function appendMsg(role, text) {
    const body = document.getElementById('fabAiBody');
    if (!body) return null;
    const wrap = document.createElement('div');
    wrap.className = 'fab-ai-msg ' + role;
    const bub = document.createElement('div');
    bub.className = 'fab-ai-bubble';
    if (role === 'ai') {
      bub.innerHTML = mdToHtml(text);
      // Add TTS row
      const row = document.createElement('div');
      row.className = 'fab-ai-tts-row';
      const btn = document.createElement('button');
      btn.className = 'fab-ai-tts-btn';
      btn.innerHTML = '🔊 Read';
      btn.onclick = function(){ speakToggle(btn, text); };
      const rate = document.createElement('select');
      rate.className = 'fab-ai-tts-rate';
      rate.title = 'Reading speed';
      ['0.8','1.0','1.2','1.5','2.0'].forEach(function(r){
        const o = document.createElement('option');
        o.value = r; o.textContent = r + 'x';
        if (r === '1.0') o.selected = true;
        rate.appendChild(o);
      });
      row.appendChild(btn);
      row.appendChild(rate);
      bub.appendChild(row);
    } else {
      bub.textContent = text;
    }
    wrap.appendChild(bub);
    body.appendChild(wrap);
    body.scrollTop = body.scrollHeight;
    return bub;
  }

  function appendLoading(){
    const body = document.getElementById('fabAiBody');
    if (!body) return null;
    const wrap = document.createElement('div');
    wrap.className = 'fab-ai-msg ai';
    wrap.id = 'fabAiLoading';
    const bub = document.createElement('div');
    bub.className = 'fab-ai-bubble';
    bub.innerHTML = '<div class="fab-ai-loading"><div class="fab-ai-spinner"></div> Thinking...</div>';
    wrap.appendChild(bub);
    body.appendChild(wrap);
    body.scrollTop = body.scrollHeight;
    return wrap;
  }

  function removeLoading(){
    const el = document.getElementById('fabAiLoading');
    if (el) el.remove();
  }

  function appendStatus(text, isErr){
    const body = document.getElementById('fabAiBody');
    if (!body) return;
    const div = document.createElement('div');
    div.className = 'fab-ai-status' + (isErr ? ' err' : '');
    div.innerHTML = text;
    body.appendChild(div);
    body.scrollTop = body.scrollHeight;
  }

  function renderSuggestions(ctx){
    const body = document.getElementById('fabAiBody');
    if (!body) return;
    // Q preview at top
    if (ctx.question) {
      const qp = document.createElement('div');
      qp.className = 'fab-ai-qpreview';
      qp.innerHTML = '<b>Q:</b> ' + ctx.question.substring(0, 240) + (ctx.question.length > 240 ? '...' : '');
      body.appendChild(qp);
    }
    // Suggestion chips
    const sug = document.createElement('div');
    sug.className = 'fab-ai-suggestions';
    const chips = [];
    if (ctx.picked === null || ctx.picked === undefined) {
      chips.push({ label: '💡 Give me a hint', q: 'Give me a hint for this question without revealing the answer.' });
      chips.push({ label: '🧠 Explain the concept', q: 'Explain the core concept this question is testing.' });
    } else if (ctx.picked !== ctx.correct && ctx.picked !== null) {
      chips.push({ label: '❌ Why did I miss this?', q: 'I picked the wrong answer. Walk me through why my pick is wrong and why the correct answer is right.' });
      chips.push({ label: '🧠 Explain the concept', q: 'Explain the concept this question is testing in simpler terms.' });
      chips.push({ label: '🎯 Give me a mnemonic', q: 'Give me a memorable mnemonic for this topic.' });
    } else if (ctx.picked === ctx.correct) {
      chips.push({ label: '✅ Why is this right?', q: 'Confirm why the correct answer is right and flag any trap distractors to watch for.' });
      chips.push({ label: '🎯 Give me a mnemonic', q: 'Give me a memorable mnemonic for this topic.' });
    }
    chips.push({ label: '🌟 Use an analogy', q: 'Explain this with a dumbed-down analogy.' });
    chips.forEach(c => {
      const btn = document.createElement('button');
      btn.className = 'fab-ai-sug';
      btn.textContent = c.label;
      btn.onclick = () => sendMessage(c.q);
      sug.appendChild(btn);
    });
    body.appendChild(sug);
  }

  function clearChat(preserveCtx){
    const body = document.getElementById('fabAiBody');
    if (body) body.innerHTML = '';
    history = [];
    if (preserveCtx) {
      const ctx = readCurrentQ();
      renderSuggestions(ctx);
    }
  }

  function openPanel() {
    if (!panel) panel = buildPanel();
    panel.classList.add('open');
    const ctx = readCurrentQ();
    const key = qKey(ctx);
    if (key !== currentQKey) {
      // Q changed — reset chat and show suggestions for new Q
      currentQKey = key;
      clearChat(true);
    }
  }

  function buildPanel() {
    const el = document.createElement('div');
    el.className = 'fab-ai-panel';
    el.innerHTML = '<div class="fab-ai-header">'
      + '<h3>🩺 Study Tutor</h3>'
      + '<button class="fab-ai-hdr-btn" onclick="fabAiClear()">Clear</button>'
      + '<button class="fab-ai-close" onclick="fabAiClose()">×</button>'
      + '</div>'
      + '<div class="fab-ai-body" id="fabAiBody"></div>'
      + '<div class="fab-ai-followup">'
      + '<button class="fab-ai-mini-close" title="Close panel" onclick="fabAiClose()">×</button>'
      + '<textarea id="fabAiFollowup" placeholder="Ask a question about this Q..." rows="1" onkeydown="if(event.keyCode===13&&!event.shiftKey){event.preventDefault();fabAiFollowupSend();}"></textarea>'
      + '<button onclick="fabAiFollowupSend()">Send</button>'
      + '</div>';
    document.body.appendChild(el);
    return el;
  }

  window.fabAiClose = function(){ if(panel) panel.classList.remove('open'); };
  window.fabAiClear = function(){ clearChat(true); };

  async function callWorker(payload) {
    if (!ENDPOINT) return { clipboardFallback: true };
    try {
      const res = await fetch(ENDPOINT, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || ('HTTP ' + res.status));
      return { reply: data.reply };
    } catch (e) {
      return { error: String(e.message || e) };
    }
  }

  function clipboardFallback(ctx, userQ) {
    const letter = (i) => String.fromCharCode(65 + i);
    let prompt = "I'm studying FAB 101 with Dr. Bui at SCUHS. Drill question:\n\n";
    prompt += 'Q: ' + ctx.question + '\n\n';
    if (ctx.options && ctx.options.length) {
      ctx.options.forEach((o, i) => {
        const m = [];
        if (i === ctx.picked) m.push('PICKED');
        if (i === ctx.correct) m.push('CORRECT');
        prompt += letter(i) + '. ' + o + (m.length ? ' ('+m.join(', ')+')' : '') + '\n';
      });
      prompt += '\n';
    }
    if (ctx.profTip) prompt += 'DRILL TIP: ' + ctx.profTip + '\n\n';
    if (userQ) prompt += 'MY QUESTION: ' + userQ + '\n\n';
    prompt += 'Explain using a dumbed-down analogy + mnemonic.';
    navigator.clipboard.writeText(prompt).then(() => {
      appendStatus('✓ Prompt copied to clipboard. Ask the Study Tutor (the 🩺 button).');
    }).catch(() => {
      appendStatus('Could not copy. Please select manually.', true);
    });
  }

  async function sendMessage(userText) {
    const ctx = readCurrentQ();
    currentQKey = qKey(ctx);
    appendMsg('user', userText);
    history.push({ role: 'user', content: userText });
    appendLoading();

    const payload = Object.assign({}, ctx, {
      userQuestion: userText,
      history: history.slice(-10), // last 10 turns for context
      className: CLASS_NAME, // worker uses this to load class-specific knowledge
    });
    const result = await callWorker(payload);
    removeLoading();
    if (result.clipboardFallback) {
      clipboardFallback(ctx, userText);
      return;
    }
    if (result.error) {
      appendStatus('Error: ' + result.error, true);
      return;
    }
    appendMsg('ai', result.reply);
    history.push({ role: 'model', content: result.reply });
  }

  window.fabAiFollowupSend = function() {
    const ta = document.getElementById('fabAiFollowup');
    const q = (ta && ta.value || '').trim();
    if (!q) return;
    ta.value = '';
    sendMessage(q);
  };

  // Button install — opens panel, does NOT auto-call AI
  function install() {
    if (document.getElementById('fabAiBtn')) return;
    const btn = document.createElement('button');
    btn.className = 'fab-ai-btn';
    btn.id = 'fabAiBtn';
    btn.textContent = '🩺';
    btn.title = 'Open AI Study Tutor';
    btn.onclick = () => openPanel();
    document.body.appendChild(btn);
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', install);
  } else {
    install();
  }
})();
