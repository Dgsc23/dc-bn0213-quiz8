<script id="bn0213-m6-audio-url-fixer-early-v1">
(function(){
  if (location.protocol === "file:") return;
  var URLS = {};  /* no https-only src rewriting: audio is same-origin */
  function rewrite(el) {
    var src = el.getAttribute("src") || "";
    if (!src) return false;
    var fname = src.split("/").pop().split("?")[0];
    if (URLS[fname] && src !== URLS[fname]) {
      el.setAttribute("src", URLS[fname]);
      return true;
    }
    return false;
  }
  function handleAudio(a) {
    var changed = false;
    if (rewrite(a)) changed = true;
    a.querySelectorAll("source").forEach(function(s){
      if (rewrite(s)) changed = true;
    });
    if (changed) { try { a.load(); } catch(e){} }
  }
  function swap(){
    document.querySelectorAll("audio").forEach(handleAudio);
  }
  if (document.readyState === "loading") document.addEventListener("DOMContentLoaded", swap);
  else swap();
  setTimeout(swap, 500);
  // MutationObserver: catches audio elements created lazily (e.g. MC drill PiP bar).
  function startObserver() {
    if (!window.MutationObserver) return;
    var obs = new MutationObserver(function(muts){
      muts.forEach(function(m){
        m.addedNodes && m.addedNodes.forEach(function(node){
          if (node.nodeType !== 1) return;
          if (node.tagName === "AUDIO") handleAudio(node);
          else if (node.querySelectorAll) {
            node.querySelectorAll("audio").forEach(handleAudio);
          }
        });
      });
    });
    obs.observe(document.body || document.documentElement, { childList: true, subtree: true });
  }
  if (document.readyState === "loading") document.addEventListener("DOMContentLoaded", startObserver);
  else startObserver();
})();
</script>

isely because it is nonpolar and hydrophobic.", "✓ Dr. Basso says oil likes to stick together because it is hydrophobic and does not like water, so it stays contained rather than dispersing."], "source": "Dr. Basso - Lecture · 36:41 · Introduction: Lipids", "quote": "oil likes to stick together because it's hydrophobic. It doesn't like water.", "profTip": "", "hint": "What does hydrophobic literally say about its relationship with water?", "obj": "Describe the hydrophobic property of lipids.", "hy": 0}, {"cat": "Lipid Properties & Function", "q": "How does Dr. Basso define lipids as a group of molecules?", "o": ["A single, uniform molecule found only in cell membranes", "A family of water-soluble sugars", "A heterogeneous group of compounds (fats, oils, steroids, waxes) that contain fatty acids or a steroid nucleus", "A class of proteins that fold up to store energy"], "c": 2, "r": ["✗ Lipids are diverse, not a single molecule, and they do far more than sit in membranes.", "✗ Sugars are carbohydrates and are water-soluble; lipids are hydrophobic and chemically distinct.", "✓ Dr. Basso defines lipids as a heterogeneous group, including fats, oils, steroids, and waxes, that contain either fatty acids or a steroid nucleus.", "✗ Lipids are not proteins; they are largely hydrocarbons containing fatty acids or a steroid nucleus."], "source": "Dr. Basso - Lecture · 36:51 · Introduction: Lipids", "quote": "lipids are a heterogeneous group of compounds, including fats, oils, steroids, waxes, et cetera, containing fatty acids or a steroid nucleus.", "profTip": "", "hint": "Heterogeneous means varied; what two building blocks did he name?", "obj": "Describe the general nature and classes of lipids.", "hy": 0}, {"cat": "Lipid Properties & Function", "q": "Dr. Basso likes to say that lipids are mostly hydrocarbons. Why does that composition make them such a good energy source?", "o": ["Breaking the many carbon-to-carbon and carbon-to-hydrogen bonds releases a large amount of energy", "Hydrocarbons dissolve easily in blood and are quickly absorbed", "Hydrocarbons are packed with phosphate groups that store energy", "Hydrocarbons are charged, so they attract water and swell"], "c": 0, "r": ["✓ Dr. Basso explains lipids are largely carbons and hydrogens, and breaking those numerous carbon-carbon and carbon-hydrogen bonds gives you a lot of energy.", "✗ Lipids are hydrophobic and do not dissolve easily in blood; solubility is not the source of their energy.", "✗ Hydrocarbons are carbon and hydrogen, not phosphate; the energy comes from the hydrocarbon bonds themselves.", "✗ Hydrocarbons are nonpolar and uncharged, which is why they repel water rather than attract it."], "source": "Dr. Basso - Lecture · 37:30 · Introduction: Lipids", "quote": "they are mostly hydrocarbons... and the hydrocarbons breaking those bonds gives you a lot of energy.", "profTip": "", "hint": "Think about what is stored in all those C-C and C-H bonds.", "obj": "Describe the hydrocarbon nature and high-energy property of lipids.", "hy": 0}, {"cat": "Lipid Properties & Function", "q": "Lipids are insoluble in water. According to Dr. Basso, what CAN dissolve them, as shown by his paint-cleanup example?", "o": ["Salt water", "Strong acids only", "Nothing; lipids are insoluble in every solvent", "Organic solvents such as ether, chloroform, benzene, and acetone"], "c": 3, "r": ["✗ Salt water is still water-based; because lipids are hydrophobic, adding salt does not dissolve them.", "✗ He never cites acids; he names organic solvents and demonstrates with acetone on spilled paint.", "✗ Lipids are insoluble in water but do dissolve in organic solvents, so nothing is wrong.", "✓ Dr. Basso says lipids are insoluble in water but dissolve in organic solvents like ether, chloroform, benzene, and acetone (acetone doubling as paint thinner)."], "source": "Dr. Basso - Lecture · 38:25 · Introduction: Lipids", "quote": "it's insoluble in water because it's hydrophobic, but it can dissolve in organic solvents like ether, chloroform, benzene, acetone.", "profTip": "", "hint": "What do you reach for to clean up spilled oil-based paint?", "obj": "Describe the solubility properties of lipids.", "hy": 0}, {"cat": "Lipid Properties & Function", "q": "Dr. Basso warns that eating a dry salad with no dressing may cause you to miss out on nutrients. Which vitamins require dietary fat for absorption?", "o": ["Vitamin C and the B-complex vitamins", "The fat-soluble vitamins D, E, A, and K", "Only vitamin C", "All of the water-soluble vitamins"], "c": 1, "r": ["✗ Vitamin C and the B vitamins are water-soluble and do not need fat for absorption.", "✓ Dr. Basso says fats let you absorb the fat-soluble vitamins D, E, A, and K, which is why a salad should be paired with fat such as nuts, avocado, or olive oil.", "✗ Vitamin C is water-soluble; the fat-dependent vitamins are D, E, A, and K.", "✗ Water-soluble vitamins dissolve in water and do not require fat; the fat-soluble set is D, E, A, and K."], "source": "Dr. Basso - Lecture · 40:10 · Lipid Function (energy, membrane, DEAK, hormones)", "quote": "Fats also allow you to absorb fat-soluble vitamins. Vitamin D, E, A, and K.", "profTip": "", "hint": "Four letters; these vitamins are called fat-soluble.", "obj": "Indicate the role of lipids in absorbing fat-soluble vitamins.", "hy": 0}, {"cat": "Lipid Properties & Function", "q": "Dr. Basso points to testosterone and estrogen to illustrate which function of lipids?", "o": ["Serving as the body's genetic blueprint", "Carrying oxygen through the blood", "Serving as the raw material for steroid hormones", "Speeding up digestion as enzymes"], "c": 2, "r": ["✗ Genetic information is carried by nucleic acids, not lipids.", "✗ Oxygen transport is the job of hemoglobin, not lipids.", "✓ Dr. Basso lists steroid hormones such as testosterone and estrogen as an important lipid-based function in humans.", "✗ Enzymes are proteins; here lipids serve as hormone precursors, not digestive catalysts."], "source": "Dr. Basso - Lecture · 42:07 · Lipid Function (energy, membrane, DEAK, hormones)", "quote": "Steroid hormones... Think of testosterone. Think of estrogen.", "profTip": "", "hint": "What class of hormones are testosterone and estrogen?", "obj": "Indicate the role of lipids as precursors of steroid hormones.", "hy": 0}, {"cat": "Lipid Properties & Function", "q": "In the cadaver lab you should find a fat pad around the kidney. Dr. Basso uses this to illustrate which function of fat?", "o": ["Protection and cushioning of internal organs", "Production of digestive enzymes", "Synthesis of DNA", "Transport of oxygen to tissues"], "c": 0, "r": ["✓ Dr. Basso says the fat pad around the kidney provides protection, cushioning the organ (his car-accident analogy about absorbing impact).", "✗ Digestive enzymes are proteins made by glands, not a role of the perirenal fat pad.", "✗ DNA synthesis has nothing to do with the protective fat around organs.", "✗ Oxygen transport is hemoglobin's job; the kidney fat pad is about physical protection."], "source": "Dr. Basso - Lecture · 42:31 · Lipid Function (energy, membrane, DEAK, hormones)", "quote": "there should be a fat pad around the kidney... because that's going to provide some protection.", "profTip": "", "hint": "Why would you want padding around a delicate organ?", "obj": "Indicate the protective and cushioning function of lipids.", "hy": 0}, {"cat": "Lipid Properties & Function", "q": "Dr. Basso notes that fat also insulates nerve cells. Which structure did he say is made of fat?", "o": ["The ribosomes of the neuron", "The synaptic vesicles", "The cell nucleus", "The myelin sheath wrapping the axons"], "c": 3, "r": ["✗ Ribosomes are made of RNA and protein, not fat.", "✗ Synaptic vesicles store neurotransmitters; he did not identify them as the fatty insulating structure.", "✗ The nucleus houses DNA; it is not the fatty insulation of the axon.", "✓ Dr. Basso says the myelin that wraps around your axons is made of fat, insulating the nerve fiber."], "source": "Dr. Basso - Lecture · 43:49 · Lipid Function (energy, membrane, DEAK, hormones)", "quote": "The myelin that wraps around your axons is made of fat.", "profTip": "", "hint": "Think of the insulating layer around nerve fibers.", "obj": "Indicate the insulating function of lipids (myelin).", "hy": 0}, {"cat": "Lipid Properties & Function", "q": "Among the functions of lipids, Dr. Basso lists lung surfactant. Which lipid did he name as the lung surfactant?", "o": ["Cholesterol", "Dipalmitoyl lecithin", "Glycerol", "Arachidonic acid"], "c": 1, "r": ["✗ Cholesterol is a membrane sterol and hormone precursor, not the surfactant he named.", "✓ Dr. Basso names dipalmitoyl lecithin as the lung surfactant, mentioning it alongside respiratory distress syndrome from lab.", "✗ Glycerol is the three-carbon alcohol backbone of tags, not the lung surfactant.", "✗ Arachidonic acid is a fatty acid precursor for eicosanoids, not the surfactant he cited."], "source": "Dr. Basso - Lecture · 44:01 · Lipid Function (energy, membrane, DEAK, hormones)", "quote": "Surfactant for the lungs. Dipalmitoyl lecithin.", "profTip": "", "hint": "He named a specific phospholipid surfactant, not a generic fat or sterol.", "obj": "Indicate the role of lipids as lung surfactant.", "hy": 0}, {"cat": "Lipid Properties & Function", "q": "Dr. Basso noted that burn victims are at major risk of dehydration in part because they lose which protective feature?", "o": ["Their outer oily, waterproof skin barrier", "Their store of essential fatty acids", "Their supply of triacylglycerols", "Their carboxyl termini"], "c": 0, "r": ["✓ He said skin's oily, waterproof coating guards against dehydration, and losing that outer barrier is one reason burn victims dehydrate.", "✗ Essential fatty acids concern the diet (omega-3/omega-6), not the skin's physical water barrier he described.", "✗ Triacylglycerols are an energy store, not the surface waterproofing layer lost in a burn.", "✗ The carboxyl terminus is a feature of a fatty acid's chemistry, unrelated to the skin's barrier."], "source": "Dr. Basso - Lecture · 50:52 · Wax: ester of fatty acid + long-chain alcohol", "quote": "That's why burn victims are at major risk of dehydration... one of them is losing that outer barrier", "profTip": "", "hint": "Why would losing the skin's waxy, water-repelling layer be dangerous?", "obj": "Relate the waterproofing (hydrophobic) function of surface lipids to preventing dehydration.", "hy": 1}, {"cat": "Lipid Properties & Function", "q": "Dr. Basso invokes the saying 'you are what you eat.' What point is he making about dietary fatty acids?", "o": ["Dietary fats are all burned for energy and leave no structural mark", "The fatty acids you eat are built into your plasma membranes and help set their fluidity", "Dietary fats are converted entirely into cholesterol", "Only saturated fats can be incorporated into cell membranes"], "c": 1, "r": ["✗ His point is the opposite - the fats you eat DO leave a structural mark in your membranes.", "✓ 'whatever fatty acids you are eating... that's going to help make up your plasma membranes... and they maintain fluidity of the cell membrane.'", "✗ He says dietary fatty acids build membranes, not that they all become cholesterol.", "✗ No such restriction - even trans fats get incorporated, which is exactly the problem he goes on to describe."], "source": "Dr. Basso - Lecture · 92:40 · Essential FAs: membrane phospholipids, fluidity", "quote": "so you are what you eat... and they maintain fluidity of the cell membrane", "profTip": "", "hint": "Your diet literally builds your membranes.", "obj": "Explain that dietary fatty acids are incorporated into membranes and influence fluidity.", "hy": 0}, {"cat": "Triacylglycerols & Wax", "q": "According to Dr. Basso, what is the general structure of a triacylglycerol (what your lab report calls a triglyceride)?", "o": ["A glycerol backbone joined to a single steroid nucleus", "Three fatty acid chains joined to glycerol by ester linkages", "Two fatty acid chains and a phosphate group joined to glycerol", "One fatty acid wrapped around three glycerol molecules"], "c": 1, "r": ["✗ A steroid nucleus defines sterols like cholesterol, not a triacylglycerol; tags are built on glycerol with fatty acids, not a steroid ring.", "✓ Dr. Basso defines a tag as three fatty acid chains (one, two, and three) each attached to the three-carbon glycerol through an ester linkage.", "✗ Two fatty acids plus a phosphate describes a phospholipid, which is why phospholipids sit in membranes; a tag has three fatty acids and no phosphate.", "✗ The ratio is reversed: one glycerol carries three fatty acids, not one fatty acid carrying three glycerols."], "source": "Dr. Basso - Lecture · 47:18 · Fats (Triacylglycerols): glycerol + 3 fatty acids", "quote": "There are three fatty acid chains, one, two, and three. And then they have an ester linkage through that oxygen, and that is bonding the glycerol molecule.", "profTip": "", "hint": "Count the fatty acids and remember what the backbone molecule is.", "obj": "Outline the general structure of triacylglycerols and indicate their function.", "hy": 0}, {"cat": "Triacylglycerols & Wax", "q": "Dr. Basso describes glycerol, the backbone that anchors the three fatty acids of a triacylglycerol. What kind of molecule is glycerol?", "o": ["A long-chain saturated fatty acid", "A phosphate-containing head group", "A three-carbon alcohol", "A cholesterol-derived steroid ring"], "c": 2, "r": ["✗ The long chains are the three fatty acids bonded to glycerol; glycerol itself is not a fatty acid.", "✗ A phosphate head group belongs to phospholipids; the tag backbone is a simple alcohol with no phosphate.", "✓ Dr. Basso states glycerol is an alcohol that is just three carbons, providing the attachment points for the fatty acids.", "✗ Steroid rings are a separate lipid class; glycerol is a small three-carbon alcohol, not a ring."], "source": "Dr. Basso - Lecture · 47:34 · Fats (Triacylglycerols): glycerol + 3 fatty acids", "quote": "Glycerol is an alcohol... it's just the three carbons there.", "profTip": "", "hint": "How many carbons, and what functional-group family?", "obj": "Outline the general structure of triacylglycerols.", "hy": 0}, {"cat": "Triacylglycerols & Wax", "q": "Dr. Basso says triacylglycerols are how the body likes to store its fats. Where are they primarily stored?", "o": ["In adipocytes (fat cells)", "In the myelin sheaths of neurons", "Floating freely in the bloodstream as glucose", "Inside red blood cells"], "c": 0, "r": ["✓ Dr. Basso says the esters of fatty acids with glycerol are stored in adipocytes, which is how the body stores fat.", "✗ Myelin is made of fat, but it insulates axons; it is not the body's triacylglycerol storage depot.", "✗ Glucose is a carbohydrate, not a triacylglycerol, and tags are hydrophobic so they do not float freely in blood.", "✗ Red blood cells are not the fat-storage site; adipocytes are the dedicated storage cells for tags."], "source": "Dr. Basso - Lecture · 47:42 · Fats (Triacylglycerols): glycerol + 3 fatty acids", "quote": "esters and fatty acids with glycerol stored in adipocytes. This is how we like to store our fats.", "profTip": "", "hint": "Which cell type is named for storing fat?", "obj": "Indicate the storage function of triacylglycerols.", "hy": 0}, {"cat": "Triacylglycerols & Wax", "q": "Dr. Basso explains that fats can also take the form of a wax. How does he describe the structure of a wax?", "o": ["Three fatty acids esterified to glycerol", "Two fatty acids attached to a sphingosine backbone", "A fatty acid bonded to a phosphate head group", "Esters of fatty acids with a monohydric alcohol (a single hydroxyl group)"], "c": 3, "r": ["✗ Three fatty acids on glycerol is a triacylglycerol; a wax uses a different alcohol with only one hydroxyl, not glycerol's three.", "✗ A sphingosine backbone describes sphingolipids, not waxes.", "✗ A phosphate head group describes a phospholipid; a wax contains no phosphate.", "✓ Dr. Basso defines a wax as esters of fatty acids with a monohydric alcohol, meaning an alcohol with just one hydroxyl group."], "source": "Dr. Basso - Lecture · 48:08 · Fats (Triacylglycerols): glycerol + 3 fatty acids", "quote": "fats can also be waxes, esters of fatty acids with monohydric, 1-hydroxyl group.", "profTip": "", "hint": "How many hydroxyl groups does the alcohol in a wax have, versus glycerol?", "obj": "Outline the structure of triacylglycerols and related fatty-acid esters (waxes).", "hy": 0}, {"cat": "Triacylglycerols & Wax", "q": "According to Dr. Basso, a wax is an ester formed when a fatty acid combines with which other component?", "o": ["A molecule of glycerol", "A phosphate group", "A long-chain alcohol", "A second fatty acid"], "c": 2, "r": ["✗ Glycerol joined to three fatty acids makes a triacylglyceride, not a wax.", "✗ A phosphate group is the hallmark of a phospholipid, not a component of a wax.", "✓ He defined a wax as the ester of a fatty acid with a long-chain alcohol (e.g., palmitic acid forming spermaceti wax).", "✗ A wax pairs a fatty acid with a long-chain alcohol, not with a second fatty acid."], "source": "Dr. Basso - Lecture · 48:21 · Wax: ester of fatty acid + long-chain alcohol", "quote": "", "profTip": "", "hint": "Think of the shiny coating on a palm leaf: a fatty acid joined to what kind of molecule?", "obj": "Outline the general structure of a wax (ester of a fatty acid and a long-chain alcohol).", "hy": 0}, {"cat": "Triacylglycerols & Wax", "q": "Which of the following did Dr. Basso list as a function of waxes in animals and plants?", "o": ["Carrying oxygen in the blood", "Energy storage and waterproofing", "Encoding proteins for the cell", "Buffering the pH of blood"], "c": 1, "r": ["✗ Oxygen transport is the job of hemoglobin, not a function of wax.", "✓ He listed the wax functions as energy storage, waterproofing, and being hydrophobic (candles are wax too).", "✗ Encoding proteins is the role of nucleic acids, not lipids such as wax.", "✗ pH buffering was not among the wax functions he named."], "source": "Dr. Basso - Lecture · 51:04 · Wax: ester of fatty acid + long-chain alcohol", "quote": "functions are multiple energy storage, waterproofing, as we talked about, hydrophobic", "profTip": "", "hint": "Recall the list he gave right after the palm-tree and cactus examples.", "obj": "Indicate the functions of waxes.", "hy": 1}, {"cat": "Triacylglycerols & Wax", "q": "When Dr. Basso drew out 'your tag' (triacylglycerol), what three-part structure did he point to?", "o": ["A phosphate head, an amino alcohol, and two fatty acids", "A single fatty acid esterified to a cholesterol ring", "A glycerol backbone joined by ester linkages to three fatty acids", "A sphingosine backbone with a sugar and one fatty acid"], "c": 2, "r": ["✗ That describes a phospholipid, not a triacylglycerol.", "✗ A TAG has three fatty acids on glycerol, not one fatty acid on a cholesterol ring.", "✓ He pointed to three fatty acids connected by ester linkages (through the oxygen bond) to a glycerol backbone; that is the TAG.", "✗ That describes a glycosphingolipid, not a triacylglycerol."], "source": "Dr. Basso - Lecture · 101:35 · Fatty Acids in Triacylglycerols", "quote": "here's a fatty acid, here is your ester linkages through the oxygen bond, and there's your glycerol.", "profTip": "He flagged the TAG drawing with emphasis, joking you would 'have to draw this out on the exam.' Know it as glycerol plus 3 fatty acids joined by ester linkages.", "hint": "One backbone plus how many fatty acids?", "obj": "Outline the general structure of triacylglycerols (glycerol + 3 fatty acids).", "hy": 1}, {"cat": "Fatty Acid Structure", "q": "Dr. Basso stressed that every fatty acid has two ends. What are these two termini?", "o": ["An amino terminus and a carboxyl terminus", "A phosphate terminus and a glycerol terminus", "A methyl terminus and a carboxyl terminus", "A hydroxyl terminus and a sulfhydryl terminus"], "c": 2, "r": ["✗ An amino terminus belongs to amino acids; a fatty acid's non-acid end is a methyl group, not an amino group.", "✗ Phosphate and glycerol belong to other lipids (phospholipids and triacylglycerols), not the ends of a fatty acid.", "✓ He insisted you know the two ends: the methyl terminus (CH3) and the carboxyl terminus (COOH).", "✗ A fatty acid is capped by a methyl end and a carboxyl end; there is no hydroxyl or sulfhydryl terminus in his description."], "source": "Dr. Basso - Lecture · 52:03 · Fatty Acids: C4-C24, R-COOH, the 4 types", "quote": "make sure you know that there's those two terminus, the methyl terminus and the carboxyl terminus", "profTip": "He flagged this out loud as a must-know: 'make sure you know that there's those two terminus.'", "hint": "One end is the acid (COOH); what is the other end (CH3)?", "obj": "Identify the two termini of a fatty acid (methyl and carboxyl).", "hy": 1}, {"cat": "Fatty Acid Structure", "q": "Dr. Basso said the carbon-chain length of fatty acids can vary across what span, giving short-, medium-, and long-chain fatty acids?", "o": ["From 1 to 6 carbons", "From 10 to 100 carbons", "From 24 to 48 carbons", "From 4 to 24 carbons"], "c": 3, "r": ["✗ The lower bound he gave was four carbons (C4), not one.", "✗ 100 carbons far exceeds the C24 upper limit he stated.", "✗ C4 is the minimum, not C24; the span is 4 to 24, not 24 to 48.", "✓ He said fatty-acid length varies from C4 (four carbons) up to 24 carbons, giving short-, medium-, and long-chain fatty acids."], "source": "Dr. Basso - Lecture · 52:19 · Fatty Acids: C4-C24, R-COOH, the 4 types", "quote": "the lengths of the fatty acids can vary from C4, four carbons, all the way to 24 carbons", "profTip": "", "hint": "Short-, medium-, and long-chain together span which range of carbon counts?", "obj": "State the carbon-chain length range of fatty acids (C4 to C24).", "hy": 1}, {"cat": "Fatty Acid Structure", "q": "What did Dr. Basso give as the general formula for a fatty acid, reflecting its carboxyl-capped hydrocarbon chain?", "o": ["R-COOH", "R-NH2", "R-PO4", "R-OH"], "c": 0, "r": ["✓ He gave the general formula as R-COOH: a hydrocarbon chain (R) ending in the carboxyl (COOH) group.", "✗ R-NH2 depicts an amine; the acidic group of a fatty acid is the carboxyl, not an amino group.", "✗ R-PO4 implies a phosphate (a phospholipid feature), not a fatty acid.", "✗ R-OH is an alcohol; the defining end group of a fatty acid is the carboxyl (COOH)."], "source": "Dr. Basso - Lecture · 52:36 · Fatty Acids: C4-C24, R-COOH, the 4 types", "quote": "The general formula is R-C-O-O-H because they have the carboxyl group on the end", "profTip": "", "hint": "R is the hydrocarbon chain; which group sits on the acidic end?", "obj": "Recall the general formula of a fatty acid (R-COOH).", "hy": 1}, {"cat": "Saturated vs Unsaturated", "q": "Besides being 'saturated with hydrogens,' how did Dr. Basso say you can recognize a saturated fatty acid by its bonds?", "o": ["It has exactly one carbon-carbon double bond", "It has many carbon-carbon double bonds", "It has no carbon-carbon double bonds", "It has a double bond only at the methyl end"], "c": 2, "r": ["✗ One carbon-carbon double bond describes a monounsaturated fatty acid, not a saturated one.", "✗ Many double bonds describes a polyunsaturated fatty acid, the opposite of saturated.", "✓ He said we call it saturated 'because there are no double bonds' (no carbon-to-carbon double bonds; the carboxyl group's own bond is not counted).", "✗ A saturated fatty acid has no carbon-carbon double bonds anywhere, including at the methyl end."], "source": "Dr. Basso - Lecture · 52:50 · Fatty Acids: C4-C24, R-COOH, the 4 types", "quote": "Why do we call it saturated? Because there are no double bonds.", "profTip": "He noted the carboxyl group's own double bond 'doesn't count.'", "hint": "Beyond being 'full of hydrogens,' what is absent from the carbon backbone?", "obj": "Describe the bond difference that defines a saturated fatty acid (no carbon-carbon double bonds).", "hy": 1}, {"cat": "Saturated vs Unsaturated", "q": "In the moment he told the class to remember 'forever,' how did Dr. Basso explain why a fatty acid is called saturated?", "o": ["Because it is dissolved (saturated) in water", "Because it is saturated with hydrogens", "Because it holds the maximum number of double bonds", "Because its carboxyl end is saturated with oxygen"], "c": 1, "r": ["✗ 'Saturated' here refers to hydrogen content, not to dissolving in water; fatty acids are hydrophobic.", "✓ His 'remember this forever' point: a fatty acid is saturated because it is saturated WITH hydrogens (no carbon-carbon double bonds, so hydrogens everywhere).", "✗ The reverse is true: saturated fatty acids have NO carbon-carbon double bonds, which is why they carry the most hydrogens.", "✗ It refers to hydrogens along the chain, not oxygen at the carboxyl group."], "source": "Dr. Basso - Lecture · 53:03 · Fatty Acids: C4-C24, R-COOH, the 4 types", "quote": "hopefully you will remember this forever... We say it's saturated because it's saturated with hydrogens", "profTip": "His single most emphasized line ('hopefully you will remember this forever'): saturated = saturated WITH hydrogens.", "hint": "What are those hydrogens doing 'everywhere' on the saturated chain?", "obj": "Explain why a fatty acid is called saturated (it is saturated with hydrogens).", "hy": 1}, {"cat": "Saturated vs Unsaturated", "q": "How did Dr. Basso distinguish a MONOunsaturated from a POLYunsaturated fatty acid?", "o": ["Mono has many double bonds; poly has one", "Mono is always an omega-3; poly is always an omega-6", "Mono is essential; poly is non-essential", "Mono has one double bond; poly has many double bonds"], "c": 3, "r": ["✗ This reverses the prefixes; mono means one and poly means many.", "✗ The omega number depends on where the first double bond sits, not on the mono/poly distinction.", "✗ Essentiality (omega-3/omega-6) is a separate property and does not define mono versus poly.", "✓ 'Mono' means one double bond (e.g., oleic acid) and 'poly' means many double bonds (the PUFAs)."], "source": "Dr. Basso - Lecture · 55:50 · Fatty Acids: C4-C24, R-COOH, the 4 types", "quote": "Poly means many, many double bonds", "profTip": "", "hint": "Translate the prefixes: mono = ? and poly = ?", "obj": "Distinguish mono- from poly-unsaturated fatty acids by the number of double bonds.", "hy": 0}, {"cat": "Saturated vs Unsaturated", "q": "Dr. Basso told the class to 'pay attention' to a fatty acid with a double bond. What does a carbon-carbon double bond do to the shape of the chain?", "o": ["It makes the chain perfectly straight", "It adds extra hydrogens at that carbon", "It puts a bend (kink) in the chain", "It converts the fatty acid into glycerol"], "c": 2, "r": ["✗ A double bond does the opposite of straightening; the saturated (no double bond) chain is the straight one.", "✗ At the double bond the carbons are missing hydrogens, which is why it is unsaturated, not gaining hydrogens.", "✓ He told the class to notice the 'slight bend': a carbon-carbon double bond changes the chain's linearity and puts a bend in it.", "✗ A double bond does not turn a fatty acid into glycerol; glycerol is a separate backbone molecule."], "source": "Dr. Basso - Lecture · 59:43 · Nomenclature / Naming: unsaturated vs saturated", "quote": "Notice this, everyone. Pay attention. Look. See how there's a slight bend?", "profTip": "He flagged it: 'Notice this, everyone. Pay attention.' A double bond puts a bend in the chain.", "hint": "Compare the straight saturated chain with the unsaturated one; what does the double bond do to its shape?", "obj": "Explain that a carbon-carbon double bond introduces a bend in the fatty-acid chain.", "hy": 1}, {"cat": "Saturated vs Unsaturated", "q": "Dr. Basso asked whether EPA, with its five double bonds, is a PUFA or a MUFA. What is the answer and why?", "o": ["PUFA, because 'poly' means many double bonds", "MUFA, because 'mono' refers to a single long chain", "MUFA, because it has one carboxyl group", "Neither, because it is a saturated fatty acid"], "c": 0, "r": ["✓ EPA is a PUFA (polyunsaturated) because 'poly' means many double bonds, and EPA has five.", "✗ MUFA means monounsaturated (one double bond); 'mono' does not refer to chain length.", "✗ The 'mono' in MUFA refers to a single double bond, not the number of carboxyl groups.", "✗ EPA has five double bonds, so it is highly unsaturated, not saturated."], "source": "Dr. Basso - Lecture · 66:28 · Omega Fatty Acids: ALA, EPA, DHA, LA, AA", "quote": "PUFA because it's poly because there's many double bonds.", "profTip": "", "hint": "Mono = one, poly = many... double bonds.", "obj": "Classify fatty acids as MUFA (one double bond) vs PUFA (many double bonds).", "hy": 1}, {"cat": "Saturated vs Unsaturated", "q": "Dr. Basso listed examples of saturated fats and gave a general rule about their food sources. Which statement matches what he said?", "o": ["Saturated fats come only from plants; there are no animal sources", "All plant oils are saturated and all animal fats are unsaturated", "Saturated fats are mostly animal products (butter, cheese, milk, meat), with plant exceptions like palm oil and coconut oil", "Saturated fats always contain at least one double bond"], "c": 2, "r": ["✗ Backwards. Saturated fats are mostly animal products, though some plants (palm, coconut oil) are exceptions.", "✗ He said the opposite tendency: animal products tend to be saturated and plants tend to be unsaturated (with exceptions).", "✓ Saturated fats are mostly animal products (palmitic acid, butter, cheese, milk, meat), with plant exceptions such as palm oil and coconut oil.", "✗ Saturated fats have NO double bonds (all single bonds); that is the definition."], "source": "Dr. Basso - Lecture · 68:50 · Saturated Fatty A d vs Unsaturated", "q": "Dr. Basso contrasts monounsaturated (MUFA) and polyunsaturated (PUFA) fatty acids by counting double bonds. How many carbon-carbon double bonds does a MUFA have?", "o": ["None - it is fully saturated", "More than one", "At least three", "Exactly one"], "c": 3, "r": ["✗ A fatty acid with zero double bonds is saturated, not monounsaturated.", "✗ 'More than one' double bond defines a PUFA (poly), not a MUFA.", "✗ Three or more double bonds is a polyunsaturated fatty acid, not a mono.", "✓ 'MUFAs only have one double bond' - the prefix mono means one."], "source": "Dr. Basso - Lecture · 73:21 · Unsaturated Fatty Acids: mono vs poly", "quote": "MUFAs only have one double bond.", "profTip": "", "hint": "Mono = one.", "obj": "Distinguish MUFA (one double bond) from PUFA (more than one).", "hy": 0}, {"cat": "Nomenclature & Omega", "q": "Dr. Basso taught a quick way to classify a fatty acid as omega-3, -6, or -9. What is the method?", "o": ["Count carbons from the carboxyl (alpha) end to the first double bond", "Count carbons from the methyl (omega) end to the first double bond", "Count the total number of double bonds in the chain", "Count the total number of carbons in the chain"], "c": 1, "r": ["✗ You start from the methyl/omega end, not the carboxyl (alpha) end.", "✓ He said to look at the methyl (omega) end and count carbons; the first double bond you reach dictates omega-3, -6, or -9.", "✗ The omega number marks the position of the FIRST double bond from the omega end, not the total number of double bonds.", "✗ Total chain length does not set the omega number; the position of the first double bond does."], "source": "Dr. Basso - Lecture · 54:46 · Fatty Acids: C4-C24, R-COOH, the 4 types", "quote": "if we count from the omega end, the first double bond we see will dictate if it's an omega 3, 6, 9, etc.", "profTip": "", "hint": "Which end do you start counting from, and what feature are you counting toward?", "obj": "Explain how a fatty acid is classified as omega-3, -6, or -9.", "hy": 0}, {"cat": "Nomenclature & Omega", "q": "When identifying an omega-3 PUFA, why did Dr. Basso say the additional double bonds further down the chain do not change the classification?", "o": ["Only the double bond nearest the omega (methyl) end sets the number", "An omega-3 has only one double bond in total", "You actually count double bonds from the carboxyl end", "The additional double bonds cancel each other out"], "c": 0, "r": ["✓ He stressed counting from the omega end to the FIRST double bond only: 'It doesn't matter that there's another one coming up. You just count the first one.'", "✗ An omega-3 PUFA has several double bonds; only the first one from the omega end matters for the name.", "✗ Counting begins at the omega (methyl) end, not the carboxyl end.", "✗ Extra double bonds are not cancelled; they are simply not used to assign the omega number."], "source": "Dr. Basso - Lecture · 55:32 · Fatty Acids: C4-C24, R-COOH, the 4 types", "quote": "It doesn't matter that there's another one coming up. You just count the first one.", "profTip": "", "hint": "A PUFA has several double bonds; which single one names it?", "obj": "Apply the omega rule: the first double bond from the omega end sets the classification.", "hy": 0}, {"cat": "Nomenclature & Omega", "q": "In fatty acid naming, Dr. Basso mapped 'alpha' and 'omega' to the two ends of the molecule. Which mapping did he give?", "o": ["Alpha = the methyl end; omega = the carboxyl end", "Alpha = the carboxyl end; omega = the methyl end", "Alpha = the middle of the chain; omega = both ends", "Alpha = the first double bond; omega = the last double bond"], "c": 1, "r": ["✗ This reverses them; omega (meaning 'the end') is the methyl end, and alpha ('beginning') is the carboxyl end.", "✓ He mapped the carboxyl end as the alpha end and the methyl end as the omega end (alpha = first/beginning, omega = the end).", "✗ Alpha and omega label the two termini, not the middle or both ends he methyl-end carbon"], "c": 1, "r": ["✗ That terminal carbon is the omega carbon, not the alpha carbon.", "✓ Numbering starts at the COOH end, so the carbon adjacent to the carboxylic acid is the alpha carbon; the next one is beta.", "✗ The position of the first double bond defines the omega number, not the alpha carbon.", "✗ The methyl end is the omega end; the alpha carbon is at the opposite (carboxyl) end."], "source": "Dr. Basso - Lecture · 63:52 · Naming: alpha & beta carbons from the COOH end", "quote": "The carbon adjacent to the COOH is the alpha carbon.", "profTip": "", "hint": "Alpha is the beginning; where does carbon numbering start?", "obj": "Explain fatty acid nomenclature: the alpha carbon is adjacent to the COOH group.", "hy": 1}, {"cat": "Nomenclature & Omega", "q": "What did Dr. Basso identify as the 'omega carbon' of a fatty acid?", "o": ["The carboxylic acid (COOH) carbon", "The carbon adjacent to the COOH group", "The terminal (last) carbon, at the methyl end", "The carbon bearing the third double bond"], "c": 2, "r": ["✗ The COOH carbon is at the alpha (carboxyl) end, the opposite end from omega.", "✗ The carbon adjacent to COOH is the alpha carbon, not the omega carbon.", "✓ The terminal carbon at the methyl end is the omega carbon; the next one in is omega-2, and so on.", "✗ Double-bond position gives the omega NUMBER of the fatty acid; the omega CARBON itself is simply the last carbon."], "source": "Dr. Basso - Lecture · 64:08 · Naming: alpha & beta carbons from the COOH end", "quote": "The terminal carbon is called the omega carbon.", "profTip": "", "hint": "Omega is the last letter of the Greek alphabet.", "obj": "Explain fatty acid nomenclature: the omega carbon is the terminal methyl-end carbon.", "hy": 1}, {"cat": "Nomenclature & Omega", "q": "Dr. Basso stressed that a fatty acid's carbons can be counted two different ways. Which pairing is correct?", "o": ["Greek letters (alpha, beta...) count from the methyl end; omega numbers count dicates no double bonds.", "✓ The zero after the colon means zero double bonds, so a C18:0 fatty acid is saturated."], "source": "Dr. Basso - Lecture · 65:58 · Omega Fatty Acids: ALA, EPA, DHA, LA, AA", "quote": "If it had a zero there, it means it's saturated. There's no double bonds.", "profTip": "", "hint": "What does a zero after the colon tell you about double bonds?", "obj": "Interpret CX:0 as a saturated fatty acid with no double bonds.", "hy": 1}, {"cat": "Nomenclature & Omega", "q": "How did Dr. Basso describe DHA (docosahexaenoic acid)?", "o": ["18 carbons, 3 double bonds, omega-3", "22 carbons, 6 double bonds, omega-3", "20 carbons, 5 double bonds, omega-3", "24 carbons, 4 double bonds, omega-6"], "c": 1, "r": ["✗ Those are the numbers for alpha-linolenic acid (C18:3), not DHA.", "✓ DHA has 22 carbons and 6 double bonds and is an omega-3 ('hexa' = six double bonds).", "✗ That is EPA (20 carbons, 5 double bonds), not DHA.", "✗ DHA is 22 carbons with 6 double bonds and is omega-3, not omega-6."], "source": "Dr. Basso - Lecture · 67:21 · Omega Fatty Acids: ALA, EPA, DHA, LA, AA", "quote": "that's 22 with six double bonds, and it's an omega-3", "profTip": "", "hint": "The 'hexa' in its name hints at the number of double bonds.", "obj": "Recall DHA = 22 carbons, 6 double bonds, omega-3.", "hy": 0}, {"cat": "Nomenclature & Omega", "q": "Dr. Basso described linoleic acid. What are its carbon count, double bonds, and omega class?", "o": ["20 carbons, 5 double bonds, omega-3", "18 carbons, 3 double bonds, omega-3", "18 carbons, 2 double bonds, omega-6", "22 carbons, 6 double bonds, omega-6"], "c": 2, "r": ["✗ That is EPA (an omega-3), not linoleic acid.", "✗ Those numbers (C18:3, omega-3) describe alpha-linolenic acid; linoleic acid has only 2 double bonds and is omega-6.", "✓ Linoleic acid is 18 carbons with 2 double bonds and is an omega-6.", "✗ That is DHA, not linoleic acid."], "source": "Dr. Basso - Lecture · 67:35 · Omega Fatty Acids: ALA, EPA, DHA, LA, AA", ver converts these fatty acids into glucose.", "✗ These modifications lengthen and desaturate the fatty acid; they do not produce cholesterol.", "✗ The whole point is active enzymatic modification, not leaving them unchanged."], "source": "Dr. Basso - Lecture · 75:10 · Essential Fatty Acids (omega 3, 6) pathways", "quote": "just know that we can modify fatty acids de novo depending on what our body is doing", "profTip": "He said don't memorize the specific intermediates - 'just know that we can modify fatty acids de novo.'", "hint": "Think enzymes that add carbons and double bonds.", "obj": "Explain that dietary essential FAs are modified de novo by elongation and desaturation.", "hy": 1}, {"cat": "Essential Fatty Acids & Eicosanoids", "q": "Starting from dietary alpha-linolenic acid, Dr. Basso traces the omega-3 pathway to two fatty acids he says are 'really good for you.' In order, which two are they?", "o": ["Arachidonic acid, then gamma-linolenic acid", "DHA first, then EPA", "Gamma-linolenic acid, then arachidonic acid", "EPA first, then DHA"], "c": 3, "r": ["✗ Both of these belong to the omega-6 pathway, not the omega-3 end-products.", "✗ Right molecules, wrong order - EPA forms first and is then modified further into DHA.", "✗ Gamma-linolenic and arachidonic acid are omega-6 pathway molecules.", "✓ The omega-3 pathway runs from alpha-linolenic acid through to EPA (eicosapentaenoic), then on to DHA (docosahexaenoic)."], "source": "Dr. Basso - Lecture · 76:19 · Essential Fatty Acids (omega 3, 6) pathways", "quote": "This is EPA... and we get DHA, dicosahexaenoic acid", "profTip": "", "hint": "Which fish-oil letters come first?", "obj": "Sequence the omega-3 end-products: EPA then DHA.", "hy": 0}, {"cat": "Essential Fatty Acids & Eicosanoids", "q": "Flagging it as 'really important - listen up,' how does Dr. Basso generally characterize omega-6 versus omega-3 fatty acids?", "o": ["Both families are equally pro-inflammatory", "Omega-6 are anti-inflammatory; omega-3 are pro-inflammatory", "Omega-6 are generally pro-inflammatory; omega-3 are generally anti-inflammatory", "Neither family has any effect on inflammation"], "c": 2, "r": ["✗ He explicitly contrasts the two families - they are not equal.", "✗ Reversed - omega-6 tend to be pro-inflammatory and omega-3 anti-inflammatory.", "✓ 'omega-6s are pro-inflammatory... omega-3 fatty acids are less inflammatory... you could say they're anti-inflammatory.'", "✗ He ties both families directly to inflammatory pathways, so they clearly affect inflammation."], "source": "Dr. Basso - Lecture · 77:48 · Essential Fatty Acids (omega 3, 6) pathways", "quote": "generally speaking, omega-6s are pro-inflammatory... omega-3s tend to be anti-inflammatory", "profTip": "He flagged this 'really important - listen up' and said it's why the nutrition world praises omega-3s.", "hint": "Which family calms inflammation?", "obj": "Contrast omega-6 (pro-inflammatory) with omega-3 (anti-inflammatory) tendencies.", "hy": 1}, {"cat": "Essential Fatty Acids & Eicosanoids", "q": "A student concludes 'omega-6 is bad.' How does Dr. Basso correct that?", "o": ["Omega-6 is always harmful and should be eliminated from the diet", "Omega-6 itself isn't bad - the problem is getting too much of it (or having inflammatory conditions)", "Omega-6 is completely harmless in any amount", "Omega-6 is only harmful if eaten together with omega-3"], "c": 1, "r": ["✗ He explicitly says 'Omega-6 is not bad' and tells students not to 'hate on omega-6s.'", "✓ 'everything is bad if you get too much of it' - omega-6 becomes a problem in excess or with inflammatory issues like inflammatory arthritis.", "✗ He is clear that too much omega-6 CAN be harmful, so it is not harmless in any amount.", "✗ Omega-3 doesn't make omega-6 harmful; if anything omega-3 helps balance it."], "source": "Dr. Basso - Lecture · 79:16 · Essential Fatty Acids (omega 3, 6) pathways", "quote": "everything is bad if you get too much of it", "profTip": "", "hin e two named essential fatty acids.", "✓ 'so linoleic and linolenic role as membrane phospholipids' - linoleic (omega-6) and linolenic (omega-3) are the essential fatty acids.", "✗ These are omega-6 pathway intermediates he told you NOT to memorize, not the parent essential fatty acids.", "✗ EPA and DHA are omega-3 end-products, not the two essential fatty acids he names here."], "source": "Dr. Basso - Lecture · 91:59 · Essential FAs: membrane phospholipids, fluidity", "quote": "", "profTip": "", "hint": "The two names are only one letter apart.", "obj": "Name linoleic (omega-6) and linolenic (omega-3) as the two essential fatty acids.", "hy": 0}, {"cat": "Essential Fatty Acids & Eicosanoids", "q": "Dr. Basso finds it 'interesting' that omega-3 - itself a fatty acid - does what to blood lipids, correlating with decreased cardiovascular risk?", "o": ["Raises serum triacylglycerols (tags)", "Has no measurable effect on blood tags", "Is associated with a decrease in serum triacylglycerols (tags)", "Converts blood tags directly into cholesterol"], "c": 2, "r": ["✗ Opposite - omega-3 is associated with a DECREASE in serum tags.", "✗ He specifically highlights an effect: lower blood tags.", "✓ 'it's actually a fatty acid, omega-3, but it's associated with a decrease in blood tags,' and it correlates with decreased cardiovascular risk.", "✗ He describes lowering tags (and remnant lipoproteins), not converting them into cholesterol."], "source": "Dr. Basso - Lecture · 93:43 · Essential FAs: membrane phospholipids, fluidity", "quote": "it's actually a fatty acid, omega-3, but it's associated with a decrease in blood tags", "profTip": "", "hint": "A fat that lowers blood fat.", "obj": "Recall that dietary omega-3 lowers serum triacylglycerols and correlates with lower cardiovascular risk.", "hy": 0}, {"cat": "Essential Fatty Acids & Eicosanoids", "q": "On the 'Omega Fatty Acids: Clinical Significance' point, what does Dr. Basso say omega-3 fatty acids do at the cell membrane?", "o": ["They reduce the arachidonic acid content in the membrane phospholipids of platelets, endothelial cells, and inflammatory cells", "They increase arachidonic acid in every membrane in the body", "They strip all phospholipids out of the membrane", "They convert membrane cholesterol into arachidonic acid"], "c": 0, "r": ["✓ 'Omega-3 fatty acids reduce the content of arachidonic acid in the membrane phospholipids, in platelets, endothelial cells, and inflammatory cells' - omega-3 substitutes in for the omega-6.", "✗ Opposite - omega-3 LOWERS membrane arachidonic acid by displacing the omega-6.", "✗ Omega-3 substitutes into phospholipids; it does not strip phospholipids out.", "✗ He describes displacing arachidonic acid, not converting cholesterol."], "source": "Dr. Basso - Lecture · 94:11 · Omega Fatty Acids: Clinical Significance", "quote": "Omega-3 fatty acids reduce the content of arachidonic acid in the membrane phospholipids, in platelets, endothelial cells, and inflammatory cells", "profTip": "", "hint": "Omega-3 crowds omega-6 out of your membranes.", "obj": "State that omega-3 displaces arachidonic acid in membrane phospholipids of platelets, endothelial, and inflammatory cells.", "hy": 0}, {"cat": "Essential Fatty Acids & Eicosanoids", "q": "On the Omega Fatty Acids: Clinical Significance slide, what effect did Dr. Basso say omega-3s have on platelets?", "o": ["They increase platelet aggregation, making blood stickier", "They have no measurable effect on platelets", "They decrease platelet aggregation, so blood is less sticky and less likely to clot", "They destroy platelets, causing bleeding"], "c": 2, "r": ["✗ It is the reverse; omega-3s reduce aggregation, making blood less sticky.", "✗ He described a clear effect: reduced aggregation, improved rheology, and better perfusion.", "✓ Basso said omega-3s lower platelet aggregation, so blood is less sticky, rheology improves, and clots are less likely.", "✗ Omega-3s reduce aggregation; he did not say they sso defined cis and trans by which side the hydrogens sit on, not by 'sharing' them.", "✓ Cis means both hydrogens are on the same side of the C=C, which is what produces the bend in the chain."], "source": "Dr. Basso - Lecture · 96:06 · Cis vs Trans Fatty Acids", "quote": "cis means both of the hydrogens are on the same side of the double bond", "profTip": "", "hint": "Same side versus opposite sides.", "obj": "Understand the difference between cis and trans carbon-carbon double bonds.", "hy": 0}, {"cat": "Cis vs Trans", "q": "How does Dr. Basso define a trans carbon-carbon double bond?", "o": ["There is a hydrogen on one side and a hydrogen on the other side", "Both hydrogens sit on the same side of the double bond", "There are no hydrogens on the double-bonded carbons", "The double bond is fully saturated with hydrogens"], "c": 0, "r": ["✓ Trans means one hydrogen is on one side and the other hydrogen is on the opposite side of the double bond.", "✗ That is the cis configuration, which creates the bend in the chain.", "✗ The double-bonded carbons still carry hydrogens; it is their opposite-side position that defines trans.", "✗ A carbon-carbon double bond is by definition a point of unsaturation, not something 'fully saturated.'"], "source": "Dr. Basso - Lecture · 96:11 · Cis vs Trans Fatty Acids", "quote": "trans means there is a hydrogen on one side and a hydrogen on the other side", "profTip": "", "hint": "Hydrogens on opposite sides of the double bond.", "obj": "Understand the difference between cis and trans carbon-carbon double bonds.", "hy": 0}, {"cat": "Cis vs Trans", "q": "What does the trans configuration do to the shape of the fatty acid chain?", "o": ["It puts a sharp bend in the chain", "It coils the chain into a ring", "It straightens the chain out instead of leaving a bend", "It has no effect on the chain's shape"], "c": 2, "r": ["✗ The bend is characteristic of a cis double bond; trans does the opposite.", "✗ Basso never described a ring; he contrasted straight (trans) with bent (cis).", "✓ A trans double bond straightens the chain out instead of leaving the bend that a cis bond would create.", "✗ The whole point is that trans changes the shape, straightening it so it can pack like a saturated fat."], "source": "Dr. Basso - Lecture · 96:21 · Cis vs Trans Fatty Acids", "quote": "it straightens it out instead of having as much of a bend", "profTip": "", "hint": "Cis bends the chain; trans does the opposite.", "obj": "Understand the difference between cis and trans carbon-carbon double bonds.", "hy": 0}, {"cat": "Cis vs Trans", "q": "Dr. Basso stressed that although a trans fat is technically unsaturated, how does it actually behave?", "o": ["Like an essential omega-3 fatty acid", "Like a phospholipid in the membrane", "Like a molecule with no fat-like properties at all", "Like a saturated fatty acid"], "c": 3, "r": ["✗ Omega-3s bend and stay liquid; a trans fat does the opposite.", "✗ Phospholipids are a different lipid class; the point here is that trans acts like a saturated fat.", "✗ It is still a fat, it simply behaves like a saturated one.", "✓ Because the trans double bond straightens the chain, a trans fat, though technically unsaturated, behaves like a saturated fatty acid."], "source": "Dr. Basso - Lecture · 96:25 · Cis vs Trans Fatty Acids", "quote": "So a trans fat, although it is unsaturated, it acts kind of like a saturated fatty acid.", "profTip": "", "hint": "A straightened chain packs like which fat type?", "obj": "Understand the difference between cis and trans carbon-carbon double bonds.", "hy": 0}, {"cat": "Cis vs Trans", "q": "Why does Dr. Basso say saturated (and trans) fats were favored for products like cakes, cookies, snack chips, and fried foods?", "o": ["They are liquid at room temperature, making batter pourable", "They are solid at room temperature", "They add omega-3 fatty acids to the product", "They prevent any oxidation of the food"], "c": 1, "r": ["✗ It is the opposite; their solidity at room temperature is the useful property.", "✓ Saturated fats (and trans fats that mimic them) are solid at room temperature, which is why they were used in cakes, cookies, snack chips, and fried foods.", "✗ These fats are not a source of omega-3s; that is unrelated to why they were used.", "✗ Basso tied their use to being solid at room temperature, not to preventing oxidation."], "source": "Dr. Basso - Lecture · 96:36 · Cis vs Trans Fatty Acids", "quote": "saturated fatty acids are solid at room temperature, and therefore that's why they like to use it in cakes, cookies, snack chips, fried foods", "profTip": "", "hint": "Think about the physical state at room temperature.", "obj": "Relate the straightened trans/saturated structure to physical properties and food use.", "hy": 0}, {"cat": "Cis vs Trans", "q": "Dr. Basso said trans fats can also occur naturally. Which food did he give as an example?", "o": ["Dairy such as milk and some yogurt", "Margarine", "Snack chips", "Vegetable shortening"], "c": 0, "r": ["✓ He gave dairy (milk and some yogurt) as naturally containing a small amount of trans fat, because cows are ruminant animals whose gut bacteria create some.", "✗ Margarine's trans fats came from hydrogenation, not from nature.", "✗ Snack chips got their trans fats from added hydrogenated fats, not naturally.", "✗ Vegetable shortening is a hydrogenation-derived source, not a natural one."], "source": "Dr. Basso - Lecture · 97:18 · Cis vs Trans Fatty Acids", "quote": "yogurt, for instance, or dairy. It's because the cows, they're ruminant animals.", "profTip": "", "hint": "Comes from a ruminant animal.", "obj": "Distinguish naturally occurring trans fats from hydrogenation-derived trans fats.", "hy": 0}, {"cat": "Cis vs Trans", "q": "How did Dr. Basso explain what margarine is and why older margarine contained trans fats?", "o": ["It is churned animal butterfat that naturally forms trans fats", "It is a plant oil such as soybean oil that was hydrogenated, which created trans fats", "It is an omega-3-rich fish oil emulsion", "It is glycerol bonded to three saturated fatty acids"], "c": 1, "r": ["✗ Margarine is made from plant oil, not animal butterfat; it was pitched as a butter replacement.", "✓ Margarine is a plant oil like soybean oil that was hydrogenated, and that hydrogenation created trans fats.", "✗ It is not a fish-oil product; it is a hydrogenated plant oil.", "✗ That describes a generic triacylglycerol, not specifically margarine or why it held trans fats."], "source": "Dr. Basso - Lecture · 99:17 · Cis vs Trans Fatty Acids", "quote": "It's like soybean oil or some other plant oil. But they hydrogenated it, and that was creating trans fats.", "profTip": "", "hint": "A hydrogenated plant oil sold as a butter replacement.", "obj": "Connect hydrogenation of plant oils (margarine) to trans fat formation.", "hy": 0}, {"cat": "Cis vs Trans", "q": "On the Cis vs Trans Fatty Acids slide, cis fatty acids are shown as the form found in natural whole foods. Which group are the cis-fat food examples?", "o": ["Almonds, avocados, bacon, and canola oil", "Margarine and vegetable shortening", "Cookies, crackers, and snack chips", "Deep-fried foods and baked goods"], "c": 0, "r": ["✓ The slide lists natural whole foods, such as almonds, avocados, bacon, and canola oil, as sources of cis (bent) fatty acids.", "✗ Margarine and shortening are hydrogenation-derived trans fat sources, not cis whole foods.", "✗ These processed snacks were classic trans fat carriers, not the cis examples.", "✗ Deep-fried and baked goods fall on the trans/hydrogenation side, not the cis side."], "source": "Dr. Basso - Lecture · 99:28 · Cis vs Trans Fatty Acids", "quote": "", "profTip": "", "hint": "Natural, unprocessed foods.", "obj": "Recognize that cis (bent) fatty acids are the form found in natural whole foods.", "hy": 0}, {"cat": "Cis vs Trans", "q": "On his Study Check slide, Dr. Basso asks how trans fats are created. What is the answer?", "o": ["Complete hydrogenation", "Oxidation of glycerol", "Partial hydrogenation", "Esterification with phosphate"], "c": 2, "r": ["✗ Complete hydrogenation would fully saturate the chain and give a saturated fat, not a trans fat.", "✗ Trans fats are not produced by oxidizing glycerol; the process is hydrogenation of the double bonds.", "✓ Partial hydrogenation is how trans fats are created; it leaves a hydrogen on one side and the other, forming the trans double bond.", "✗ Esterification with phosphate describes phospholipid assembly, not trans fat formation."], "source": "Dr. Basso - Lecture · 101:52 · Study Check: How are trans fats created?", "quote": "How are the trans fats created? Partial hydrogenation.", "profTip": "This is a Study Check slide; expect the exam to ask how trans fats are created, and the answer is partial (not complete) hydrogenation.", "hint": "Partial, not complete.", "obj": "Understand the difference between cis and trans carbon-carbon double bonds.", "hy": 1}, {"cat": "Cis vs Trans", "q": "What health risks did Dr. Basso attribute to trans fats?", "o": ["Increased risk of cardiovascular disease and diabetes, by a clearly established mechanism", "Increased risk of cardiovascular disease and diabetes, though the mechanism is unclear", "Decreased risk of heart disease due to plaque stabilization", "No known health effects at any intake level"], "c": 1, "r": ["✗ He did name cardiovascular disease and diabetes, but he explicitly said the mechanism is unclear, not clearly established.", "✓ Basso said trans fats are detrimental, raising the risk of cardiovascular disease and diabetes, and added that the mechanism is unclear.", "✗ Plaque stabilization was a benefit he tied to omega-3s, not to trans fats, which increase cardiovascular risk.", "✗ He called trans fats detrimental to health, not harmless."], "source": "Dr. Basso - Lecture · 102:26 · Trans Fats and Health Risks", "quote": "increased risk of cardiovascular disease and diabetes as well. Mechanism is unclear.", "profTip": "", "hint": "Two disease risks, plus what he said about how well the mechanism is understood.", "obj": "Recognize the health risks associated with trans fats.", "hy": 1}, {"cat": "Cis vs Trans", "q": "Which of the following did Dr. Basso list as a food that contained trans fats from the hydrogenation process?", "o": ["Fresh spinach", "Grass-fed butter", "Coconut oil", "Vegetable shortening"], "c": 3, "r": ["✗ He never listed leafy greens; hydrogenation-derived trans fats came from processed products.", "✗ Grass-fed butter was his recommended alternative, not a hydrogenation-derived source.", "✗ Coconut oil was offered as a plant-oil alternative, not a hydrogenated trans fat source.", "✓ Vegetable shortening was on his hydrogenation-process list, along with deep-fried foods, baked goods, cookies, crackers, chips, and margarine."], "source": "Dr. Basso - Lecture · 103:37 · Trans Fatty Acids in Food", "quote": "Deep fried foods, bread, baked goods, cookies, crackers, chips, margarine...", "profTip": "", "hint": "Think processed and deep-fried, not whole foods.", "obj": "Identify dietary sources of hydrogenation-derived trans fats.", "hy": 0}, {"cat": "Phospholipids & Sphingolipids", "q": "Dr. Basso argues that phospholipids may be the single most common molecule in the entire body. What is his reasoning?", "o": ["Every cell membrane in the body is built from phospholipids, and there are roughly 20 trillion cells", "Phospholipids are the main mineral in bone", "Phospholipids circulate in the blood as sugar", "Each phospholipid molecule contains three fatty acids, making them heavy"], "c": 0, "r": ["✓ Dr. Basso reasons that all membranes use phospholipids and, multiplied across roughly 20 trillion cells, they are probably the most common molecule in the body.", "✗ Bone mineral is largely calcium phosphate, not phospholipid.", "✗ Phospholipids are hydrophobic membrane lipids, not blood sugar (that is glucose, a carbohydrate).", "✗ A phospholipid has two fatty acids plus a phosphate, not three; his reasoning is about membrane abundance, not molecular weight."], "source": "Dr. Basso - Lecture · 39:53 · Lipid Function (energy, membrane, DEAK, hormones)", "quote": "phospholipids are probably the most common molecule in your entire body.", "profTip": "", "hint": "Think membranes multiplied by the number of cells in the body.", "obj": "Indicate the function of phospholipids as membrane constituents.", "hy": 0}, {"cat": "Phospholipids & Sphingolipids", "q": "Dr. Basso says phospholipids come in two subtypes, and the name of each depends on one specific component. Which pairing follows his rule?", "o": ["Glycerol as the alcohol makes a sphingophospholipid", "Sphingosine as the alcohol makes a glycerophospholipid", "Glycerol makes a glycerophospholipid and sphingosine makes a sphingophospholipid", "The number of fatty acids decides the subtype name"], "c": 2, "r": ["✗ This reverses the rule; glycerol gives a glycerophospholipid, not a sphingophospholipid.", "✗ This reverses the rule; sphingosine gives a sphingophospholipid, not a glycerophospholipid.", "✓ The subtype is named for its alcohol: glycerol yields a glycerophospholipid and sphingosine yields a sphingophospholipid.", "✗ The subtype is set by the identity of the alcohol, not by how many fatty acids are attached."], "source": "Dr. Basso - Lecture · 105:05 · Phospholipid Types: glycero- vs sphingo-", "quote": "And then if sphingosine is the alcohol, then it would be sphingophospholipid.", "profTip": "", "hint": "The classification is named after the alcohol on the backbone.", "obj": "Distinguish the two phospholipid subtypes by their alcohol (glycerol vs sphingosine).", "hy": 1}, {"cat": "Phospholipids & Sphingolipids", "q": "According to Dr. Basso, every phospholipid is assembled from the same set of building blocks. Which set correctly lists them?", "o": ["Three fatty acids attached to a glycerol backbone only", "A ceramide joined to a carbohydrate", "Two fatty acids and a phosphate, with no alcohol at all", "An alcohol, the fatty acids, a phosphate, and an amino alcohol"], "c": 3, "r": ["✗ That is the makeup of a triacylglycerol, not a phospholipid; a phospholipid must also carry a phosphate and an amino alcohol.", "✗ Ceramide plus a carbohydrate defines a glycolipid, not a phospholipid.", "✗ Every phospholipid does contain an alcohol backbone, so leaving it out is wrong.", "✓ Dr. Basso lists the four parts shared by every phospholipid as an alcohol, the fatty acids, a phosphate, and an amino alcohol."], "source": "Dr. Basso - Lecture · 105:16 · Phospholipid Types: glycero- vs sphingo-", "quote": "Glycerol, sphingosine, fatty acids, phosphate, amino alcohol.", "profTip": "", "hint": "He repeats the same four-part recipe for both subtypes.", "obj": "Outline the general structure of a phospholipid (alcohol, fatty acids, phosphate, amino alcohol).", "hy": 1}, {"cat": "Phospholipids & Sphingolipids", "q": "Phosphatidyl choline, also called lecithin, is Dr. Basso's example of a glycerophospholipid. Which components make it up?", "o": ["Sphingosine, one fatty acid, a phosphate, and choline", "Glycerol, two fatty acids, a phosphate, and choline as the amino alcohol", "Ceramide plus a single monosaccharide", "Glycerol with three fatty acids and no phosphate"], "c": 1, "r": ["✗ Sphingosine is the alcohol of sphingomyelin, not of lecithin; lecithin is built on glycerol.", "✓ Phosphatidyl choline (lecithin) is glycerol plus two fatty acids, a phosphate, and choline as its amino alcohol.", "✗ Ceramide plus a sugar describes a glycolipid, not lecithin.", "✗ A phospholipid must contain a phosphate, and lecithin carries two fatty acids, not three."], "source": "Dr. Basso - Lecture · 106:02 · Phospholipid Types (filled: lecithin / sphingomyelin)", "quote": "Phosphatidylcholine, lecithin, has the alcohol glycerol, two fatty acids. Phosphate. Choline is the amino alcohol, choline.", "profTip": "", "hint": "It is a glycerophospholipid, so start the list with glycerol.", "obj": "Identify lecithin as a glycerophospholipid and list its components.", "hy": 1}, {"cat": "Phospholipids & Sphingolipids", "q": "Dr. Basso flagged this as one to know for sure: what is the physiological role of dipalmitoyl lecithin?", "o": ["It forms a large portion of the myelin sheath", "It accumulates inside the neurons in Tay-Sachs disease", "It is the oligosaccharide carried by a ganglioside", "It is the lung surfactant that lowers alveolar surface tension and keeps the alveoli from collapsing"], "c": 3, "r": ["✗ That role belongs to sphingomyelin, which makes up much of the myelin sheath.", "✗ GM2 ganglioside is what accumulates in Tay-Sachs, not dipalmitoyl lecithin.", "✗ Gangliosides carry an oligosaccharide; dipalmitoyl lecithin is a phospholipid, not a sugar.", "✓ Dr. Basso stresses that dipalmitoyl lecithin is the lung surfactant, lowering the surface tension of the alveoli so they do not collapse."], "source": "Dr. Basso - Lecture · 106:23 · Lecithin: dipalmitoyl lecithin = LUNG SURFACTANT", "quote": "Dipalmitoyl lecithin is the lung surfactant, lowers the surface tension of the alveoli, and therefore preventing collapse of the alveoli.", "profTip": "This is one you should know for sure.", "hint": "Think about what keeps tiny air sacs from sticking shut.", "obj": "State that dipalmitoyl lecithin is the lung surfactant and how it works.", "hy": 1}, {"cat": "Phospholipids & Sphingolipids", "q": "In lab, Dr. Basso tied lecithin to respiratory distress syndrome (RDS) in a newborn. Why does a premature infant develop RDS?", "o": ["The infant made too much surfactant and over-inflated the alveoli", "The surfactant did not have a chance to develop, so the alveoli tend to collapse", "Excess sphingomyelin flooded the lungs", "A missing enzyme let GM2 ganglioside build up in the lungs"], "c": 1, "r": ["✗ RDS is a shortage of surfactant, not an excess of it.", "✓ In a premature infant the surfactant has not yet developed, so surface tension stays high and the alveoli tend to collapse.", "✗ Sphingomyelin buildup is the mechanism of Niemann-Pick, not of infant RDS.", "✗ GM2 ganglioside accumulation drives Tay-Sachs, not RDS."], "source": "Dr. Basso - Lecture · 106:43 · Lecithin: dipalmitoyl lecithin = LUNG SURFACTANT", "quote": "the infant was born prematurely and the surfactant didn't have a chance to get developed", "profTip": "", "hint": "No surfactant means nothing to lower the alveolar surface tension.", "obj": "Connect a surfactant deficiency to respiratory distress syndrome in a premature infant.", "hy": 1}, {"cat": "Phospholipids & Sphingolipids", "q": "Sphingomyelin is Dr. Basso's example of the second phospholipid subtype. What is its alcohol, and which subtype does that make it?", "o": ["Glycerol, which makes it a glycerophospholipid", "Choline, which makes it a glycolipid", "Sphingosine, which makes it a sphingophospholipid", "Ceramide, which makes it a cerebroside"], "c": 2, "r": ["✗ Glycerol is the alcohol of lecithin, not of sphingomyelin.", "✗ Choline is the amino alcohol in sphingomyelin, not its backbone alcohol, and sphingomyelin is a phospholipid, not a glycolipid.", "✓ Sphingomyelin uses sphingosine as its alcohol, which classifies it as a sphingophospholipid.", "✗ Ceramide plus a sugar defines a cerebroside; sphingomyelin instead carries a phosphate and choline."], "source": "Dr. Basso - Lecture · 108:17 · Sphingomyelin: sphingosine + FA + phosphate + choline", "quote": "Sphingomyelin. The alcohol is sphingosine.", "profTip": "", "hint": "The backbone alcohol echoes the first syllable of the lipid name.", "obj": "Classify sphingomyelin as a sphingophospholipid built on sphingosine.", "hy": 1}, {"cat": "Phospholipids & Sphingolipids", "q": "Dr. Basso said to definitely know this: what is the physiological relevance of sphingomyelin?", "o": ["It is the lung surfactant", "It is stored as a ganglioside in the gray matter", "It carries a single monosaccharide  axons will send your electrical impulse faster than an unmyelinated", "profTip": "", "hint": "Insulation stops the signal from leaking as it travels.", "obj": "Explain why myelinated axons conduct faster than unmyelinated fibers.", "hy": 1}, {"cat": "Phospholipids & Sphingolipids", "q": "How does Dr. Basso define a glycolipid, and what alcohol does it still contain?", "o": ["Ceramide plus a carbohydrate, and the alcohol is still sphingosine", "Glycerol plus a phosphate, with glycerol as the alcohol", "Two fatty acids plus choline, with choline as the alcohol", "A phosphate plus an amino alcohol, with no sugar attached"], "c": 0, "r": ["✓ Dr. Basso defines a glycolipid as ceramide plus a carbohydrate, and it still uses sphingosine as its alcohol.", "✗ A phosphate and glycerol describe a glycerophospholipid, not a glycolipid.", "✗ Choline is an amino alcohol found in lecithin and sphingomyelin, and glycolipids carry a sugar rather than choline.", "✗ Glycolipids have no phosphate; the defining feature is the attached carbohydrate."], "source": "Dr. Basso - Lecture · 109:51 · Glycolipids: ceramide + carbohydrate", "quote": "Ceramide plus a carbohydrate. It still has sphingosine as its alcohol.", "profTip": "", "hint": "The glyco part of the name tells you what it carries.", "obj": "Outline the general structure of a glycolipid (ceramide plus a carbohydrate).", "hy": 1}, {"cat": "Phospholipids & Sphingolipids", "q": "What is the key structural difference between a cerebroside and a ganglioside?", "o": ["A cerebroside carries an oligosaccharide while a ganglioside carries a single monosaccharide", "A cerebroside carries one monosaccharide such as glucose or galactose, while a ganglioside carries an oligosaccharide", "A cerebroside contains glycerol while a ganglioside contains sphingosine", "A cerebroside has a phosphate while a ganglioside has choline"], "c": 1, "r": ["✗ This is reversed; the cerebroside has the single sugar and the ganglioside has the oligosaccharide.", "✓ Cerebrosides carry one monosaccharide (glucose or galactose), whereas gangliosides carry an oligosaccharide of roughly three to eight sugars.", "✗ Both are glycolipids built on sphingosine, so glycerol does not distinguish them.", "✗ Neither is defined by a phosphate or by choline; both are glycolipids that differ in how many sugars they carry."], "source": "Dr. Basso - Lecture · 110:31 · Cerebrosides vs Gangliosides", "quote": "Cerebrosides have glucose or galactose, a monosaccharide, whereas the gangliosides have an oligosaccharide.", "profTip": "", "hint": "One sugar versus a short chain of sugars.", "obj": "Distinguish cerebrosides (monosaccharide) from gangliosides (oligosaccharide).", "hy": 0}, {"cat": "Phospholipids & Sphingolipids", "q": "Where does Dr. Basso locate cerebrosides versus gangliosides in the body?", "o": ["Cerebrosides in the gray matter; gangliosides in the myelin", "Cerebrosides in the lung alveoli; gangliosides in bone", "Cerebrosides in the myelin, brain and nerves; gangliosides in the gray matter of the brain", "Both are found only in the liver and spleen"], "c": 2, "r": ["✗ This is reversed; cerebrosides go with myelin and gangliosides with the gray matter.", "✗ The alveoli involve surfactant (lecithin), so this pairing is wrong.", "✓ Dr. Basso places cerebrosides in the myelin, brain and nerves, and gangliosides in the gray matter of the brain.", "✗ Cerebrosides do also appear in spleen, liver and bone, but their hallmark site is myelin and gangliosides sit in gray matter, so 'only liver and spleen' is wrong."], "source": "Dr. Basso - Lecture · 110:58 · Cerebrosides vs Gangliosides", "quote": "Where is the location for the cerebrosides? Myelin again. In the brain and nerves.", "profTip": "", "hint": "Cerebro- points back to myelin; ganglio- sits in gray matter.", "obj": "Locate cerebrosides (myelin, brain, nerves) versus gangliosides (gray matter).", "hy": 0}, {"cat": "Lysosomal Storage Diseases", "q": "What is Dr. Basso's mnemonic
